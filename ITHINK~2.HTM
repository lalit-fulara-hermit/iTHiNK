<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iTH!NK — the GAME · The First Valley</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --midnight:#0B1024; --indigo:#141B36; --royal:#1E2A55; --line:#2A3560;
    --teal:#1EA896; --gold:#D4AF37; --sienna:#C26A3D; --amethyst:#8E7BC8;
    --parchment:#EDE6D6; --stone:#A7A9B2; --text:#E8E4D8; --dim:#7A80A0;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:var(--midnight); color:var(--text); font-family:'EB Garamond',Georgia,serif; font-size:16px; line-height:1.5; display:flex; justify-content:center;}
  #game{width:min(430px,100vw); min-height:100vh; display:flex; flex-direction:column; padding:0 10px calc(14px + env(safe-area-inset-bottom));}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:10px; font-size:1rem;}
  .cinzel{font-family:'Cinzel',Georgia,serif;}

  /* HUD — slim, sticky */
  #hud{position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:10px; padding:8px 2px 6px; background:var(--midnight); min-height:44px;}
  .hi-wrap{flex:1; min-width:120px;}
  .hi-label{display:flex; justify-content:space-between; font-size:.58rem; letter-spacing:1.5px; color:var(--dim); margin-bottom:3px; text-transform:uppercase; font-family:'Cinzel',serif;}
  .hi-track{height:10px; background:#0d1230; border:1px solid var(--line); border-radius:99px; position:relative; overflow:hidden;}
  .hi-cur{position:absolute; top:0; bottom:0; left:0; background:linear-gradient(90deg,var(--sienna),var(--gold)); border-radius:99px; transition:width 1.4s ease;}
  .hi-pot{position:absolute; top:-1px; bottom:-1px; border:1.5px dashed var(--teal); border-left:none; border-radius:0 99px 99px 0;}
  .codex-chip{background:var(--indigo); border:1px solid var(--amethyst); color:var(--amethyst); border-radius:99px; padding:6px 12px; font-size:.72rem; font-family:'Cinzel',serif; letter-spacing:1px;}

  /* stage */
  #stage{width:100%; background:#0d1230; border:1px solid var(--line); border-radius:12px; overflow:hidden; line-height:0;}
  #stage svg{width:100%; height:auto; display:block;}

  /* dialogue */
  #dlg{margin-top:8px; min-height:84px;}
  .dline{background:var(--indigo); border:1px solid var(--line); border-radius:12px; padding:11px 13px; cursor:pointer;}
  .dline .who{display:inline-block; font-size:.56rem; font-weight:700; letter-spacing:1.5px; padding:3px 9px; border-radius:99px; margin-bottom:6px; font-family:'Cinzel',serif;}
  .who.aadi{background:rgba(212,175,55,.14); color:var(--gold);}
  .who.shyam{background:rgba(142,123,200,.16); color:var(--amethyst);}
  .who.narr{background:rgba(167,169,178,.12); color:var(--stone);}
  .who.tali{background:rgba(237,230,214,.12); color:var(--parchment);}
  .who.world{background:rgba(30,168,150,.14); color:var(--teal);}
  .dline .txt{display:block; font-size:.98rem;}
  .dline .adv{float:right; color:var(--dim); font-size:1rem; margin-top:-4px;}
  .choices{display:flex; flex-direction:column; gap:7px; margin-top:8px;}
  .choice{background:var(--royal); border:1px solid var(--line); color:var(--text); padding:12px 14px; border-radius:10px; text-align:left; font-size:.95rem; min-height:44px;}
  .choice:active{border-color:var(--gold);}

  /* clues */
  #clues{display:none; margin-top:7px; gap:5px; flex-wrap:wrap;}
  #clues.on{display:flex;}
  .clue{font-size:.68rem; color:var(--teal); border:1px dashed rgba(30,168,150,.55); border-radius:99px; padding:3px 10px; animation:pop .4s;}
  @keyframes pop{0%{transform:scale(.6); opacity:0;}100%{transform:scale(1); opacity:1;}}

  /* store + plan */
  #store{display:none; margin-top:8px; background:var(--indigo); border:1px solid var(--line); border-radius:12px; padding:9px 12px;}
  .st-row{display:flex; align-items:center; gap:8px; margin:4px 0;}
  .st-name{flex:0 0 70px; font-size:.6rem; letter-spacing:1px; text-transform:uppercase; color:var(--dim); font-family:'Cinzel',serif;}
  .st-track{flex:1; height:8px; background:#0d1230; border:1px solid var(--line); border-radius:99px; position:relative; overflow:hidden;}
  .st-fill{position:absolute; top:0; bottom:0; left:0; background:var(--teal); border-radius:99px; transition:width .9s ease;}
  .st-num{flex:0 0 70px; text-align:right; font-size:.78rem; color:var(--stone);}
  #plan{display:none; margin-top:8px; background:var(--indigo); border:1px solid var(--line); border-radius:12px; padding:10px 12px;}
  .plan-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;}
  .plan-title{font-size:.62rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); font-family:'Cinzel',serif;}
  .hands-left{font-size:.8rem; color:var(--stone);}
  .site{display:flex; align-items:center; gap:8px; padding:7px 0; border-top:1px solid rgba(42,53,96,.6);}
  .site-name{flex:1; cursor:pointer; line-height:1.3;}
  .site-name .nm{color:var(--text); font-size:.92rem;}
  .site-name .yl{display:block; font-size:.72rem; color:var(--dim); font-style:italic;}
  .ctr{display:flex; align-items:center; gap:6px;}
  .ctr button{width:38px; height:38px; border-radius:9px; background:var(--royal); color:var(--text); border:1px solid var(--line); font-size:1.2rem; line-height:1;}
  .ctr button:disabled{opacity:.3;}
  .ctr .n{width:20px; text-align:center; font-size:1.05rem; color:var(--gold);}
  .plan-foot{display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap;}
  .pushbox{display:flex; align-items:center; gap:6px; font-size:.8rem; color:var(--stone); cursor:pointer;}
  .gobtn{background:var(--sienna); color:#1a0e04; font-weight:700; padding:12px 18px; margin-left:auto; font-family:'Cinzel',serif; letter-spacing:1px; font-size:.82rem; min-height:44px;}
  .gobtn:disabled{opacity:.35;}

  /* helper buttons */
  .btnrow{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;}
  .ghostbtn{background:transparent; border:1px solid var(--line); color:var(--stone); padding:10px 14px; font-size:.8rem; border-radius:99px; min-height:42px;}
  .shyambtn{background:transparent; border:1px solid rgba(142,123,200,.5); color:var(--amethyst); padding:10px 14px; font-size:.8rem; border-radius:99px; display:none; min-height:42px;}

  /* whitestory parchment */
  .ws{background:var(--parchment); color:#2b2416; border-radius:14px; padding:16px 16px; margin-top:8px; font-size:.98rem;}
  .ws h3{color:#5a4a1e; letter-spacing:1px; margin-bottom:8px; font-size:.86rem; font-family:'Cinzel',serif;}
  .ws .blank{display:inline-block; min-width:90px; border-bottom:2px solid #8a7a4a; color:#8a2f14; font-weight:600; text-align:center; padding:0 4px;}
  .ws .wchoices{display:flex; flex-direction:column; gap:6px; margin-top:10px;}
  .ws .wchoice{background:#e0d6bf; border:1px solid #b3a67f; color:#2b2416; padding:11px 12px; border-radius:8px; text-align:left; font-size:.92rem; min-height:44px;}

  /* codex modal */
  #modal{display:none; position:fixed; inset:0; background:rgba(4,6,16,.88); z-index:40; justify-content:center; align-items:center; padding:14px;}
  #modal.on{display:flex;}
  .card{background:var(--indigo); border:1px solid var(--amethyst); border-radius:16px; max-width:430px; width:100%; padding:18px 18px; max-height:84vh; overflow:auto;}
  .card h3{color:var(--amethyst); margin-bottom:6px; letter-spacing:1px; font-family:'Cinzel',serif;}
  .cipm-row{display:flex; gap:9px; margin:7px 0; font-size:.88rem;}
  .cipm-row .k{flex:0 0 28px; height:28px; border-radius:8px; background:var(--royal); border:1px solid var(--amethyst); color:var(--amethyst); font-weight:800; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif;}
  .cipm-row .v{color:var(--stone); padding-top:3px;}
  .lockedcard{opacity:.5; font-size:.8rem; color:var(--dim); border-top:1px solid var(--line); padding-top:9px; margin-top:10px;}

  /* fx */
  .tw{animation:twinkle 2.6s ease-in-out infinite;}
  .tw2{animation:twinkle 3.4s ease-in-out infinite 1.2s;}
  @keyframes twinkle{0%,100%{opacity:1;}50%{opacity:.2;}}
  .flame{transform-origin:center bottom; animation:flick .9s ease-in-out infinite;}
  @keyframes flick{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.15) scaleX(.96);}}
  .glow{animation:glowp 1.8s ease-in-out infinite;}
  @keyframes glowp{0%,100%{opacity:.25;}50%{opacity:.6;}}
  .fadein{animation:fadein .8s ease;}
  @keyframes fadein{from{opacity:0;}to{opacity:1;}}
  .snow line{stroke:#cdd6f5; stroke-width:1; opacity:.5;}
  .snow{animation:snowfall 1.4s linear infinite;}
  @keyframes snowfall{0%{transform:translateY(-12px);}100%{transform:translateY(0);}}
  /* the visiting page — enters, sits, quietly leaves */
  .pagecameo{animation:pagecameo 18s ease forwards;}
  @keyframes pagecameo{
    0%{opacity:0; transform:translateX(-24px);}
    12%{opacity:.16; transform:translateX(0);}
    78%{opacity:.16; transform:translateX(0);}
    100%{opacity:0; transform:translateX(14px);}
  }
</style>
</head>
<body>
<div id="game">
  <div id="hud" style="visibility:hidden;">
    <div class="hi-wrap">
      <div class="hi-label"><span id="hiname">—</span><span><span id="hival">0</span>/<span id="hipot">0</span></span></div>
      <div class="hi-track"><div class="hi-cur" id="hicur" style="width:0%"></div><div class="hi-pot" id="hipotmark" style="left:0%; right:5%;"></div></div>
    </div>
    <button class="codex-chip" onclick="openCodex()">Codex ✦ <span id="codexn">0</span></button>
  </div>
  <div id="stage"></div>
  <div id="dlg"></div>
  <div id="clues"></div>
  <div id="store">
    <div class="st-row"><span class="st-name">Food</span><div class="st-track"><div class="st-fill" id="sf_food"></div></div><span class="st-num" id="sn_food">0 / ?</span></div>
    <div class="st-row"><span class="st-name">Firewood</span><div class="st-track"><div class="st-fill" id="sf_fuel"></div></div><span class="st-num" id="sn_fuel">0 / ?</span></div>
    <div class="st-row"><span class="st-name">Shelter</span><div class="st-track"><div class="st-fill" id="sf_shelter"></div></div><span class="st-num" id="sn_shelter">0 / ?</span></div>
  </div>

</div>
<div id="modal" onclick="this.classList.remove('on')"><div class="card" id="cardbox" onclick="event.stopPropagation()"></div></div>

<script id="sim">
/* ---- pure simulation: no DOM ---- */
const SIM = {
  HANDS: 8, MOONS: 3,
  NEED: { food: 100, fuel: 40, shelter: 15 },
  SITES: {
    grove:  { label:"the fruit grove",     unit:"food",    per:12, keep:0.3 },
    roots:  { label:"the root field",      unit:"food",    per:8,  keep:1   },
    river:  { label:"the river",           unit:"food",    per:10, keep:1, smokeFuel:2 },
    forest: { label:"the deadwood forest", unit:"fuel",    per:8 },
    huts:   { label:"the huts",            unit:"shelter", per:6 }
  }
};
function computeMoon(alloc, push, exhausted, fuelStore){
  const m = (push?1.3:1) * (exhausted?0.6:1);
  const a = k => alloc[k]||0;
  const out = { mult:m, fruitGathered:0, fruitKept:0, fruitRot:0,
                fishRaw:0, fishKept:0, fishRot:0, smokeUsed:0,
                roots:0, wood:0, hutwork:0, gained:{food:0,fuel:0,shelter:0} };
  out.fruitGathered = Math.round(a("grove")*SIM.SITES.grove.per*m);
  out.fruitKept = Math.round(out.fruitGathered*SIM.SITES.grove.keep);
  out.fruitRot = out.fruitGathered - out.fruitKept;
  out.roots = Math.round(a("roots")*SIM.SITES.roots.per*m);
  out.wood  = Math.round(a("forest")*SIM.SITES.forest.per*m);
  out.hutwork = Math.round(a("huts")*SIM.SITES.huts.per*m);
  out.fishRaw = Math.round(a("river")*SIM.SITES.river.per*m);
  if(a("river")){
    const cost = SIM.SITES.river.smokeFuel * a("river");
    const avail = fuelStore + out.wood;
    if(avail >= cost){ out.fishKept = out.fishRaw; out.smokeUsed = cost; }
    else { const hands = Math.floor(avail/SIM.SITES.river.smokeFuel);
           out.fishKept = Math.round(out.fishRaw*hands/a("river"));
           out.smokeUsed = hands*SIM.SITES.river.smokeFuel;
           out.fishRot = out.fishRaw - out.fishKept; }
  }
  out.gained.food = out.roots + out.fishKept + out.fruitKept;
  out.gained.fuel = out.wood - out.smokeUsed;
  out.gained.shelter = out.hutwork;
  return out;
}
function winterVerdict(store){
  return { food: store.food >= SIM.NEED.food,
           fuel: store.fuel >= SIM.NEED.fuel,
           shelter: store.shelter >= SIM.NEED.shelter,
           pass: store.food>=SIM.NEED.food && store.fuel>=SIM.NEED.fuel && store.shelter>=SIM.NEED.shelter };
}
if(typeof window!=="undefined") window.__sim = { SIM, computeMoon, winterVerdict };
if(typeof module!=="undefined") module.exports = { SIM, computeMoon, winterVerdict };
</script>

<script>
/* ==========================================================================
   iTH!NK v6 — Node 0: THE FIRST VALLEY · mobile-first
   Cast: Aadi (acts, guesses) · you, the talisman (decides) · Shyam (asks ONLY questions)
   Objects tell when touched; useful statements come from the world, never Shyam.
   ========================================================================== */
const S = {
  scene:"title", hi:38, pot:90, season:1, moon:1,
  store:{food:0,fuel:0,shelter:0},
  alloc:{grove:0,roots:0,river:0,forest:0,huts:0},
  examined:{}, favorDone:false, exhausted:false,
  clues:[], cards:[], rung:0, cameoShown:false,
  log:{plans:[], asks:0, deepestRung:0, visions:0, probeRetries:0, seasons:1, fruitRotTotal:0, fishRotTotal:0, pushes:0}
};
const $ = id => document.getElementById(id);
const stage = $("stage"), dlg = $("dlg");

/* ---------------- HUD / store ---------------- */
function hud(on, name){
  $("hud").style.visibility = on?"visible":"hidden";
  if(name) $("hiname").textContent = name;
  $("hival").textContent = Math.round(S.hi);
  $("hipot").textContent = S.pot;
  $("hicur").style.width = S.hi+"%";
  $("hipotmark").style.left = S.hi+"%";
  $("hipotmark").style.right = (100-S.pot)+"%";
  $("codexn").textContent = S.cards.length;
}
function raiseHI(to){ S.hi = Math.min(S.pot, Math.max(S.hi, to)); hud(true); }
function drawStore(){
  ["food","fuel","shelter"].forEach(k=>{
    const need = SIM.NEED[k];
    $("sf_"+k).style.width = Math.min(100, S.store[k]/need*100)+"%";
    $("sn_"+k).textContent = S.store[k]+" / "+(S.favorDone?need:"?");
  });
}

/* ---------------- dialogue ---------------- */
let queue = [], onQueueDone = null;
function say(lines, done){ queue = lines.slice(); onQueueDone = done||null; nextLine(); }
function nextLine(){
  if(!queue.length){ dlg.innerHTML=""; if(onQueueDone){const f=onQueueDone; onQueueDone=null; f();} return; }
  const l = queue.shift();
  const names = {aadi:"AADI", shyam:"SHYAM", narr:"—", tali:"YOU · THE TALISMAN", world:"THE WORLD"};
  dlg.innerHTML = `<div class="dline fadein" onclick="nextLine()">
    <span class="who ${l.who}">${names[l.who]}</span><span class="adv">▸</span>
    <span class="txt">${l.t}</span></div>`;
}
function choices(list){
  dlg.innerHTML = `<div class="choices fadein">${list.map((c,i)=>
    `<button class="choice" onclick="window.__c${i}()">${c.t}</button>`).join("")}</div>`;
  list.forEach((c,i)=> window["__c"+i] = c.fn);
}
function addClue(c){
  if(S.clues.includes(c)) return;
  S.clues.push(c);
  $("clues").classList.add("on");
  $("clues").innerHTML = S.clues.map(x=>`<span class="clue">◆ ${x}</span>`).join("");
}

/* ==========================================================================
   TITLE — the regal wordmark
   ========================================================================== */
function sceneTitle(){
  S.scene="title"; hud(false);
  stage.innerHTML = `
  <svg viewBox="0 0 390 440" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="goldg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#F3DE9B"/><stop offset=".5" stop-color="#D4AF37"/><stop offset="1" stop-color="#8F6E1A"/>
      </linearGradient>
      <linearGradient id="ivoryg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#F2EFE6"/><stop offset="1" stop-color="#9DA0B0"/>
      </linearGradient>
      <linearGradient id="fadeg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#7A80A0" stop-opacity=".35"/><stop offset="1" stop-color="#7A80A0" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <rect width="390" height="440" fill="#0B1024"/>
    <circle cx="60" cy="52" r="1.3" fill="#EDE6D6" class="tw"/><circle cx="330" cy="40" r="1.1" fill="#EDE6D6" class="tw2"/>
    <circle cx="200" cy="26" r="1" fill="#EDE6D6" class="tw"/><circle cx="290" cy="86" r="1.2" fill="#EDE6D6" class="tw2"/>
    <line x1="60" y1="110" x2="330" y2="110" stroke="url(#goldg)" stroke-width=".8" opacity=".6"/>
    <!-- wordmark: gold i/L bracket + TH!NK -->
    <rect x="62" y="150" width="13" height="13" fill="url(#goldg)"/>
    <rect x="62" y="172" width="13" height="66" fill="url(#goldg)"/>
    <rect x="62" y="225" width="58" height="13" fill="url(#goldg)"/>
    <text x="86" y="226" font-family="Cinzel,serif" font-weight="800" font-size="64" letter-spacing="3" fill="url(#ivoryg)">TH!NK</text>
    <!-- quiet reflection -->
    <text x="86" y="-244" transform="scale(1,-1)" font-family="Cinzel,serif" font-weight="800" font-size="64" letter-spacing="3" fill="url(#fadeg)">TH!NK</text>
    <line x1="60" y1="330" x2="330" y2="330" stroke="url(#goldg)" stroke-width=".8" opacity=".6"/>
    <text x="195" y="362" text-anchor="middle" font-size="15" letter-spacing="7" fill="url(#goldg)" font-family="Cinzel,serif" font-weight="700">THE GAME</text>
    <text x="195" y="392" text-anchor="middle" font-size="10" letter-spacing="2.5" fill="#7A80A0" font-family="Cinzel,serif">LEARN ANYTHING · UNDERSTAND EVERYTHING</text>
  </svg>`;
  dlg.innerHTML="";
  choices([{t:"Begin ▸", fn:sceneEpigraph}]);
}

/* ==========================================================================
   EPIGRAPH
   ========================================================================== */
function sceneEpigraph(){
  stage.innerHTML = `
  <svg viewBox="0 0 390 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="390" height="240" fill="#0B1024"/>
    <circle cx="70" cy="46" r="1.2" fill="#EDE6D6" class="tw"/><circle cx="300" cy="60" r="1.1" fill="#EDE6D6" class="tw2"/>
    <text x="195" y="86" text-anchor="middle" font-size="15" fill="#D4AF37" font-family="Cinzel,serif" font-weight="700">EPISODE 0 · THE FIRST VALLEY</text>
    <text x="195" y="126" text-anchor="middle" font-size="10.5" font-style="italic" fill="#A7A9B2">"Economics is the science which studies human behaviour</text>
    <text x="195" y="142" text-anchor="middle" font-size="10.5" font-style="italic" fill="#A7A9B2">as a relationship between ends and scarce means</text>
    <text x="195" y="158" text-anchor="middle" font-size="10.5" font-style="italic" fill="#A7A9B2">which have alternative uses."</text>
    <text x="195" y="186" text-anchor="middle" font-size="9.5" letter-spacing="1.5" fill="#7A80A0" font-family="Cinzel,serif">— LIONEL ROBBINS, 1932</text>
  </svg>`;
  choices([{t:"▸", fn:sceneExam}]);
}

/* ==========================================================================
   THE CITY OF ANSWERS (cold open)
   ========================================================================== */
const EXAM = [
  {q:"Define scarcity.", a:"'The state of limited resources against unlimited wants.'"},
  {q:"What is the cost of a thing?", a:"'The money paid to obtain it.'"}
];
let examIdx = 0;
function sceneExam(){
  S.scene="exam"; hud(false);
  stage.innerHTML = `
  <svg viewBox="0 0 390 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="390" height="240" fill="#0B1024"/>
    <rect x="0" y="196" width="390" height="44" fill="#141B36"/>
    <g fill="#1E2A55"><rect x="30" y="40" width="70" height="156" rx="5"/><rect x="290" y="40" width="70" height="156" rx="5"/></g>
    <g fill="#26335f"><rect x="42" y="56" width="46" height="140"/><rect x="302" y="56" width="46" height="140"/></g>

  forest: {t:"Dead branches everywhere, free for the hauling. A hand gathers eight measures of firewood a moon. Firewood is winter's blood — and the smokehouse drinks it too.", clue:"firewood: 8 a moon"},
  huts:   {t:"The roofs are tired. Wind slides in like a thief. A hand patches six measures a moon. The elder says fifteen patches stand between the children and the cold.", clue:"huts: 6 patches a moon"}

function exploreChoices(){
  const opts = [];
  if(!S.favorDone) opts.push({t:"Walk to the fruit grove", fn:treeGate});
  else if(!S.examined.grove) opts.push({t:"Walk to the fruit grove", fn:()=>tellSite("grove")});
  ["roots","river","forest","huts"].forEach(k=>{
    if(!S.examined[k]) opts.push({t:"Walk to "+SIM.SITES[k].label, fn:()=>tellSite(k)});
  });
  const seen = Object.keys(S.examined).length;
  if(S.favorDone && seen>=3) opts.push({t:"Enough walking — gather the band. We plan. ▸", fn:startPlanning});
  choices(opts);
}

}

function renderSites(){

  }).join("");
}
function yieldText(k){
  if(k==="grove") return "12 food/hand — 7 of 10 rot by winter";
  if(k==="river") return "10 food/hand — smoking eats 2 firewood per hand";
  const s=SIM.SITES[k];
  return s.per+" "+(s.unit==="shelter"?"patches":s.unit)+"/hand"+(k==="roots"?" — stores well":"");
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function siteTouch(k){
  if(!S.examined[k]){
    S.examined[k]=true;
    const t = k==="grove" ? "THE GROVE: \"A hand picks twelve a moon — and seven of ten rot before deep winter. I did warn you.\"" : TELL[k].t;

function handsUsed(){ return Object.values(S.alloc).reduce((a,b)=>a+b,0); }

}
function inc(k){ if(handsUsed()<SIM.HANDS){ S.alloc[k]++; updateHands(); } }
function dec(k){ if(S.alloc[k]>0){ S.alloc[k]--; updateHands(); } }

/* ---------------- run a moon ---------------- */
function runMoon(){
  const push = $("pushchk").checked;
  const alloc = {...S.alloc};
  const res = computeMoon(alloc, push, S.exhausted, S.store.fuel);
  S.log.plans.push({season:S.season, moon:S.moon, alloc, push, exhausted:S.exhausted});
  if(push) S.log.pushes++;
  const wasExhausted = S.exhausted;
  S.exhausted = push;
  S.store.food += res.gained.food;
  S.store.fuel += res.gained.fuel;
  S.store.shelter += res.gained.shelter;
  S.log.fruitRotTotal += res.fruitRot; S.log.fishRotTotal += res.fishRot;
  $("plan").style.display="none"; $("pushchk").checked=false;
  drawStore();

  const beats = [];
  if(wasExhausted) beats.push({who:"narr", t:"The band moves like wet rope this moon — last moon's pushing is being repaid, with interest."});
  if(alloc.grove) beats.push({who:"narr", t:`The grove: ${res.fruitGathered} measures picked${res.fruitRot?` — and by moon's end, ${res.fruitRot} lie blackened in the baskets. ${res.fruitKept} survive`:""}.`});
  if(alloc.roots) beats.push({who:"narr", t:`The root field: ${res.roots} measures dug, dried, stored. They will not betray you.`});
  if(alloc.river) beats.push({who:"narr", t:`The river: ${res.fishRaw} measures netted. ${res.fishKept} smoked and saved${res.smokeUsed?` (the smokehouse ate ${res.smokeUsed} firewood)`:""}${res.fishRot?`; ${res.fishRot} ROT unsmoked — the wood ran out`:""}.`});
  if(alloc.forest) beats.push({who:"narr", t:`The forest: ${res.wood} measures of firewood hauled.`});
  if(alloc.huts) beats.push({who:"narr", t:`The huts: ${res.hutwork} patches set against the wind.`});
  if(push) beats.push({who:"narr", t:"The band worked past dusk every day. It shows in the piles — and in their faces. Something was borrowed this moon."});

  say(beats, ()=>{ S.rung=0; afterMoon(alloc, res, push); });
}
function paceShort(){
  const frac = S.moon/SIM.MOONS;
  return ["food","fuel","shelter"].filter(k=> S.store[k] < SIM.NEED[k]*frac);
}
function afterMoon(alloc, res, push){
  const short = paceShort();
  const onPace = short.length===0;
  if(onPace) raiseHI(42 + S.moon*4);
  const lines = [];
  if(onPace){
    lines.push({who:"aadi", t: S.moon<3 ? "Look at the store. LOOK at it. In the City I never once saw a number I'd carried myself…" : "The store is fat and the roofs are tight. Now we find out what winter thinks of our arithmetic."});
  } else {
    lines.push({who:"narr", t:`(At this pace, ${short.join(" and ")} will fall short of winter's mark.)`});
    lines.push(shyamAfterMoon(alloc, res, push));
  }
  say(lines, ()=>{
    if(S.moon < SIM.MOONS){ S.moon++; S.alloc={grove:0,roots:0,river:0,forest:0,huts:0}; showPlan(); }
    else sceneWinter();
  });
}
/* Shyam's contingent question — questions ONLY, referencing the actual attempt */
function shyamAfterMoon(alloc, res, push){
  if(res.fruitRot >= 25) return {who:"shyam", t:`"The grove paid you ${res.fruitGathered} and your baskets kept ${res.fruitKept}. Who ate the difference? And had the grove not told you it would?"`};
  if(res.fishRot > 0) return {who:"shyam", t:`"The river gave ${res.fishRaw} and the smokehouse saved ${res.fishKept}. What does smoke cost — and who forgot to pay it?"`};
  if(push) return {who:"shyam", t:`"Bigger piles today. Where did this moon's extra strength come from? Was it free?"`};
  const spread = Object.values(alloc).filter(v=>v>0).length>=4 && Math.max(...Object.values(alloc))<=2;
  if(spread) return {who:"shyam", t:`"Eight hands in ${Object.values(alloc).filter(v=>v>0).length} places — is a fistful of everything a store of anything?"`};
  return {who:"shyam", t:`"What will you STOP doing next moon? Is adding the only move you know?"`};
}

/* ---------------- Shyam's cascade — every rung a question ---------------- */
function ladder(){
  const last = S.log.plans[S.log.plans.length-1];
  const topTask = last ? Object.keys(last.alloc).reduce((a,b)=> last.alloc[a]>=last.alloc[b]?a:b) : null;
  return [
    last && last.alloc[topTask]>0
      ? `"Last moon you gave ${SIM.SITES[topTask].label} ${last.alloc[topTask]} hands. While they stood THERE — what did the valley not get? Can you name it?"`
      : `"Before you choose — whatever you pick, can you name what you are NOT picking?"`,
    `"One hand. One moon. One place. Can it be in two? Then what happens to the choice you did not make — does it wait for you?"`,
    `"Count with me, slowly. Eight hands, three moons — how big is the purse? And what must it buy, all of it, before the snow?"`,
    `"On the road here we came to a fork, and you took the left path. Where did the right one go? What would you call a thing that stops existing the moment you choose?"`
  ];
}
function askShyam(){
  S.log.asks++;
  const L = ladder();
  const r = Math.min(S.rung, L.length-1);
  S.log.deepestRung = Math.max(S.log.deepestRung, r+1);
  const lines = [{who:"shyam", t:L[r]}];
  if(r===L.length-1) lines.push({who:"world", t:`THE WIND, through the grass, almost a word: "…the price… the price…"`});
  say(lines, ()=>{ if(S.scene==="plan") showPlan(); });
  S.rung = (r+1) % L.length;
}

  visionIdx = 0;
  $("plan").style.display="none"; $("store").style.display="none";
  visionStep();
}
function visionStep(){
  if(visionIdx >= VISION.length){ endVision(); return; }
  const v = VISION[visionIdx];
  S.log.visions = Math.max(S.log.visions, visionIdx+1);
  stage.innerHTML = `<svg viewBox="0 0 390 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="390" height="240" fill="#0B1024"/>${v.svg}
    <text x="195" y="16" text-anchor="middle" font-size="8.5" letter-spacing="3" fill="#8E7BC8" font-family="Cinzel,serif">VISION · ${visionIdx+1} / 3</text>
  </svg>`;
  say([{who:"tali", t:v.cap}], ()=>{
    choices([
      {t: visionIdx<VISION.length-1 ? "Further back ⟵" : "…there is nothing before this. ⟵", fn:()=>{visionIdx++; visionStep();}},
      {t:"Enough — back to the valley ↩", fn:endVision}
    ]);
  });
}
function endVision(){
  say([{who:"aadi", t: S.log.visions>=3
    ? "I recited 'limited resources' in an exam two weeks ago. I just watched the limit get ISSUED. Once. At the start of everything. …Every plan we make down there is us spending the first purse."
    : "My head is full. But that door stays open — I want to go deeper some night."}],
  ()=>{ stage.innerHTML = valleySVG(); $("store").style.display="block"; drawStore();
        if(S.scene==="plan") showPlan(); else exploreChoices(); });
}

/* ==========================================================================
   WINTER — the door is the test
   ========================================================================== */
function sceneWinter(){
  S.scene="winter"; $("plan").style.display="none";
  const v = winterVerdict(S.store);
  stage.innerHTML = `
  <svg viewBox="0 0 390 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="390" height="240" fill="#0d1433"/>
    <path d="M0,158 Q100,132 205,150 Q305,166 390,146 L390,240 L0,240 Z" fill="#c9cede" opacity="0.9"/>
    <g fill="#2a2338"><path d="M286,180 L306,162 L326,180 L326,202 L286,202 Z"/><path d="M320,184 L336,170 L352,184 L352,200 L320,200 Z"/></g>
    <ellipse cx="304" cy="208" rx="7" ry="3" fill="#C26A3D" opacity="${v.fuel? ".8":".25"}"/>
    ${v.fuel? `<path d="M301,208 Q303,196 306,208" fill="#D4AF37" class="flame"/>`:""}
    <g class="snow">${Array.from({length:20},(_,i)=>`<line x1="${20*i}" y1="${(i%5)*46}" x2="${20*i}" y2="${(i%5)*46+6}"/>`).join("")}</g>
    <text x="195" y="16" text-anchor="middle" font-size="8.5" letter-spacing="3" fill="#7A80A0" font-family="Cinzel,serif">WINTER · THE DOOR IS THE TEST</text>
  </svg>`;
  const beats = [{who:"narr", t:"The first snow does not ask if you are ready. It simply arrives, and begins counting."}];
  if(v.pass){
    beats.push({who:"narr", t:`The store holds: ${S.store.food} food against the hundred needed. The woodpile: ${S.store.fuel} against forty. The roofs: ${S.store.shelter} patches, tight as a drum.`});
    beats.push({who:"world", t:"THE ELDER, at midwinter, holding a bowl that is FULL: \"Same valley. Same hands. Same days. We have never eaten like this in deep snow. What did you change, boy?\""});
    beats.push({who:"aadi", t:"Nothing you had. Only where it STOOD. …We stopped asking the valley for more. We started asking every hand: 'and what will you NOT do today?' That question was the harvest."});
    say(beats, ()=>{ raiseHI(74); sceneWhiteStory(); });
  } else {
    const misses = [];
    if(!v.food) misses.push(`food ran out with ${S.store.food} of 100 — the gap gnaws from the third snow onward`);
    if(!v.fuel) misses.push(`the woodpile died at ${S.store.fuel} of 40 — cold moves in like a tenant`);
    if(!v.shelter) misses.push(`the roofs stood at ${S.store.shelter} patches of 15 — wind found every one it needed`);
    beats.push({who:"narr", t:"The band endures — thinner. " + misses.join("; ") + ". No one dies in the First Valley. But spring finds everyone smaller, and the children's eyes older."});
    beats.push(shyamWinterFail(v));
    beats.push({who:"world", t:"THE ELDER: \"The valley forgives. Spring comes; the moons return. Plan again — and this time, spend the purse like you have SEEN winter. Because now you have.\""});
    say(beats, ()=>{
      S.season++; S.log.seasons=S.season; S.moon=1;
      S.store={food:0,fuel:0,shelter:0}; S.exhausted=false;
      S.alloc={grove:0,roots:0,river:0,forest:0,huts:0};
      stage.innerHTML = valleySVG(); drawStore(); showPlan();
    });
  }
}
function shyamWinterFail(v){
  if(S.log.fruitRotTotal >= 50) return {who:"shyam", t:`"Across the season, ${S.log.fruitRotTotal} measures of fruit blackened in your baskets. The grove warned you on the first day, did it not? What does it cost to ignore a true warning — and who just paid it?"`};
  if(!v.fuel && S.log.fishRotTotal>0) return {who:"shyam", t:`"Two hungers, one woodpile — the hearth and the smokehouse. Which one did you choose? Did you know you were choosing?"`};
  if(S.log.pushes>=2) return {who:"shyam", t:`"Twice you spent tomorrow's strength on today's pile. Add the piles now — did the season grow, or only the noise?"`};
  return {who:"shyam", t:`"Never mind what went wrong. What would you NOT do, next season?"`};
}

/* ==========================================================================
   SAY IT IN YOUR OWN WORDS — then defend it against the valley's three voices
   ========================================================================== */
const WS_BLANKS = [
  {label:"I want to", opts:["pick every fruit in the valley","fill the winter store","make the band work harder"], ok:1},
  {label:"by", opts:["doing everything a little","gathering only what is free","spending each hand where it matters most"], ok:2},
  {label:"so that", opts:["the valley owes us","the band lives to spring","no fruit is ever wasted"], ok:1},
  {label:"creating value through", opts:["endless effort","choosing what to give up","taking more from the valley"], ok:1}
];
let wsIdx=0, wsPicks=[];
function sceneWhiteStory(){
  S.scene="whitestory"; wsIdx=0; wsPicks=[];
  $("store").style.display="none";
  stage.innerHTML = valleySVG(`<circle cx="195" cy="90" r="44" fill="#EDE6D6" opacity="0.06" class="glow"/>`);
  say([
    {who:"narr", t:"Spring. The whole band gathers at the old tree. It is the valley's custom: whoever changes a winter must SAY what they understood — out loud, where the valley can test it."},
    {who:"shyam", t:`"The City is full of recitations, talisman. Can you build this sentence out of what you DID?"`}
  ], wsBlankStep);
}
function wsBlankStep(){
  if(wsIdx >= WS_BLANKS.length){ probeIntro(); return; }
  const b = WS_BLANKS[wsIdx];
  const built = WS_BLANKS.map((x,i)=> i<wsIdx ? `${x.label} <span class="blank">${x.opts[wsPicks[i]]}</span>` : (i===wsIdx? `${x.label} <span class="blank">＿＿＿</span>`:"")).join(" ");
  dlg.innerHTML = `<div class="ws fadein"><h3>SAY IT IN YOUR OWN WORDS</h3>
    <div>${built}</div>
    <div class="wchoices">${b.opts.map((o,i)=>`<button class="wchoice" onclick="wsPick(${i})">${o}</button>`).join("")}</div></div>`;
}
function wsPick(i){
  const b = WS_BLANKS[wsIdx];
  if(i===b.ok){ wsPicks.push(i); wsIdx++; wsBlankStep(); }
  else {
    S.log.probeRetries++;
    const counters = [
      `THE OLD TREE: "Every fruit? Seven in ten of mine ROT, boy — your own baskets testified. Is that truly what you wanted?"`,
      `THE OLD TREE: "You TRIED that. Ask your first winter how it went."`,
      `THE OLD TREE: "The valley keeps no ledgers of debt — yet. Look at the children and try again."`
    ];
    say([{who:"world", t:counters[Math.min(wsIdx,2)] }], wsBlankStep);
  }
}
/* the three voices — the SETTING asks; no jargon, just the questions */
const PROBES = [
  {who:"THE BOULDER by the path", q:"\"You said 'give up'. What do you mean by giving up?\"",
   opts:["Working fewer hours than before","Every hand sent to one place is a hand lost to every other place","Throwing away the fruit we picked"], ok:1},
  {who:"THE OLD TREE", q:"\"How do you know that choosing beats sheer effort?\"",
   opts:["Shyam told us, and he seems wise","Twenty-four hand-moons was all we ever had; the store only filled when each went to its best use — the baskets are our proof","Because fruit tastes better when you work less"], ok:1},
  {who:"THE RIVER", q:"\"Why must anything be given up at all?\"",
   opts:["Because the elders demand sacrifice","Because fruit rots","Because hands and moons are finite — walking one path abandons every other. It began with the world itself"], ok:2}
];
let probeIdx=0;
function probeIntro(){
  say([
    {who:"narr", t:"The sentence stands. And now — the valley itself leans in. Three voices, three tests. This is how the land decides whether understanding is OWNED or borrowed."}
  ], probeStep);
}
function probeStep(){
  if(probeIdx >= PROBES.length){ wsDone(); return; }
  const p = PROBES[probeIdx];
  say([{who:"world", t:`${p.who}: ${p.q}`}], ()=>{
    choices(p.opts.map((o,i)=>({t:o, fn:()=>{
      if(i===p.ok){ probeIdx++; probeStep(); }
      else {
        S.log.probeRetries++;
        say([{who:"world", t:`${p.who}: "…No. You are reciting again. Stand in what you DID this winter, and answer from there."`}], probeStep);
      }
    }})));
  });
}
function wsDone(){
  const winning = S.log.plans.filter(p=>p.season===S.season);
  const planStr = summarizePlan(winning);
  S.cards.push({
    name:"Choice — the First Price ★",
    C:"A finite purse: 8 hands × 3 moons = 24, against needs bigger than any single task. Enough existed; it stood in the wrong places.",
    I:`The valley's offers — fruit (fast, rots), roots (slow, loyal), fish (rich, charges firewood), wood, roofs. Your season: ${planStr}.`,
    P:"Ranking wants, spending each hand-moon on its best use, and PAYING for every yes with a named no. Effort was never the lever; placement was.",
    M:"A winter that held — and the law under it: the true price of anything is what you gave up to get it. Money will not be invented for eras yet. Price already exists."
  });
  raiseHI(90); hud(true);
  say([
    {who:"narr", t:"The talisman flares — properly, for the first time. A card writes itself in the codex, out of nothing but what you actually did. (Codex: 'Choice — the First Price' lights.)"},
    {who:"world", t:"THE OLD TREE: \"Carry it, boy. Everything you meet on this road — every coin, every debt, every price — is this one law wearing better clothes.\""}
  ], sceneThreshold);
}
function summarizePlan(plans){
  const tot={grove:0,roots:0,river:0,forest:0,huts:0};
  plans.forEach(p=> Object.keys(tot).forEach(k=> tot[k]+=p.alloc[k]||0));
  return Object.keys(tot).filter(k=>tot[k]>0).map(k=>`${SIM.SITES[k].label} ${tot[k]}`).join(" · ");
}

/* ==========================================================================
   THRESHOLD + CLIFFHANGER + LOG
   ========================================================================== */
function sceneThreshold(){
  S.scene="threshold";
  stage.innerHTML = `
  <svg viewBox="0 0 390 250" xmlns="http://www.w3.org/2000/svg">
    <rect width="390" height="250" fill="#0B1024"/>
    <polyline points="40,120 95,138 150,118 205,140 260,122 315,138 360,120" fill="none" stroke="#2A3560" stroke-width="1.2"/>
    <circle cx="40" cy="120" r="8" fill="#D4AF37"/><text x="40" y="102" text-anchor="middle" font-size="10" font-weight="700" fill="#D4AF37" font-family="Cinzel,serif">0</text>
    <text x="40" y="146" text-anchor="middle" font-size="8" fill="#A7A9B2">choice ★</text>
    <text x="40" y="158" text-anchor="middle" font-size="7" fill="#8E7BC8">…at the cost of?</text>
    <circle cx="95" cy="138" r="5" fill="#0B1024" stroke="#555f85" stroke-width="1.2"/><text x="95" y="160" text-anchor="middle" font-size="8" fill="#555f85">labor</text>
    <text x="95" y="172" text-anchor="middle" font-size="7" fill="#8E7BC8">…at the cost of?</text>
    <circle cx="150" cy="118" r="5" fill="#0B1024" stroke="#555f85" stroke-width="1.2"/><text x="150" y="102" text-anchor="middle" font-size="8" fill="#555f85">surplus</text>
    <text x="150" y="90" text-anchor="middle" font-size="7" fill="#8E7BC8">…at the cost of?</text>
    <circle cx="205" cy="140" r="5" fill="#0B1024" stroke="#555f85" stroke-width="1.2"/><text x="205" y="162" text-anchor="middle" font-size="8" fill="#555f85">property</text>
    <circle cx="260" cy="122" r="5" fill="#0B1024" stroke="#555f85" stroke-width="1.2"/><text x="260" y="106" text-anchor="middle" font-size="8" fill="#555f85">exchange</text>
    <circle cx="315" cy="138" r="5" fill="#0B1024" stroke="#555f85" stroke-width="1.2"/><text x="315" y="160" text-anchor="middle" font-size="8" fill="#555f85">…</text>
    <circle cx="360" cy="120" r="6" fill="#0B1024" stroke="#D4AF37" stroke-width="1.4"/>
    <text x="360" y="103" text-anchor="middle" font-size="8" letter-spacing="1.5" fill="#D4AF37" font-family="Cinzel,serif">HOME</text>
    <text x="195" y="18" text-anchor="middle" font-size="8.5" letter-spacing="3" fill="#8E7BC8" font-family="Cinzel,serif">THE MAP REORGANIZES · A THRESHOLD IS CROSSED</text>
    <text x="195" y="222" text-anchor="middle" font-size="9.5" font-style="italic" fill="#A7A9B2">every node on the road now casts a shadow:</text>
    <text x="195" y="236" text-anchor="middle" font-size="9.5" font-style="italic" fill="#A7A9B2">"…at the cost of what?"</text>
  </svg>`;
  say([
    {who:"tali", t:"(Something shifts in how the whole road LOOKS. Every place you will ever visit now casts a faint shadow-question: at the cost of what? You cannot unsee it. That is what crossing a threshold means.)"},
    {who:"narr", t:"On the last night of spring, a small thing happens that refuses to leave Aadi alone. Bodhi the fisher comes back with two baskets. Kesar the hunter — stronger, older, prouder — comes back with half of one. Same day. Same valley. Same hours of work."},
    {who:"aadi", t:"Same purse spent… DIFFERENT harvest back. So a hand-moon is not a hand-moon? What is hiding inside WORK, Shyam? …Shyam?"},
    {who:"shyam", t:`"*already trotting toward the eastern pass* Does this valley have that answer? Then why are your feet still in it?"`}
  ], sceneLog);
}
function sceneLog(){
  const plans = S.log.plans.map(p=>{
    const parts = Object.keys(p.alloc).filter(k=>p.alloc[k]>0).map(k=>`${k}:${p.alloc[k]}`).join(" ");
    return `<span class="clue" style="border-color:var(--line); color:var(--stone);">s${p.season}·m${p.moon} — ${parts}${p.push?" ·pushed":""}</span>`;
  }).join(" ");
  dlg.innerHTML = `
  <div class="dline" style="cursor:default;">
    <div style="font-size:.6rem; letter-spacing:1.5px; color:var(--dim); text-transform:uppercase; margin-bottom:8px; font-family:'Cinzel',serif;">Journey log — what the game learned about the learner</div>
    <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:9px;">${plans}</div>
    <div style="font-size:.85rem; color:var(--stone);">
      seasons: <b style="color:var(--text)">${S.log.seasons}</b> ·
      fruit rotted: <b style="color:var(--text)">${S.log.fruitRotTotal}</b> ·
      fish lost: <b style="color:var(--text)">${S.log.fishRotTotal}</b> ·
      pushes: <b style="color:var(--text)">${S.log.pushes}</b> ·
      Shyam asked: <b style="color:var(--text)">${S.log.asks}×</b> (deepest rung ${S.log.deepestRung}/4) ·
      vision: <b style="color:var(--text)">${S.log.visions}/3</b> ·
      probes retried: <b style="color:var(--text)">${S.log.probeRetries}</b>
    </div>
    <div style="font-size:.78rem; color:var(--dim); margin-top:9px;">Every rotted basket is a diagnosed misconception; every rung is a located gap; every extra season is productive failure doing its work. At the Gate, one day, Aadi will answer with exactly what you taught him here.</div>
    <div style="font-size:.78rem; color:var(--dim); margin-top:7px; font-style:italic;">Era II consumes this card: the Labor mission opens only for those who can already name the first price. Knowledge is the crafting material.</div>
    <div class="btnrow" style="margin-top:10px;">
      <button class="ghostbtn" onclick="openCodex()">Open the Codex ✦</button>
      <button class="ghostbtn" onclick="location.reload()">Play again</button>
    </div>
    <div style="font-size:.76rem; color:var(--dim); margin-top:12px; text-align:center; font-style:italic;">…and, for the time being, that's all folks…</div>
  </div>`;
  $("clues").classList.remove("on");
  $("shyambtn").style.display="none"; $("visionbtn").style.display="none";
}

/* ---------------- codex ---------------- */
function openCodex(){
  const box = $("cardbox");
  box.innerHTML = `<h3>THE CODEX</h3>
  <p style="font-size:.8rem; color:var(--dim); margin-bottom:10px;">It lights only when something is understood. ${S.cards.length} card(s) lit.</p>
  ${S.cards.map(c=>`
    <div style="border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px;">
      <h3 style="font-size:.95rem; margin-bottom:7px;">✦ ${c.name}</h3>
      <div class="cipm-row"><span class="k">C</span><span class="v">${c.C}</span></div>
      <div class="cipm-row"><span class="k">I</span><span class="v">${c.I}</span></div>
      <div class="cipm-row"><span class="k">P</span><span class="v">${c.P}</span></div>
      <div class="cipm-row"><span class="k">M</span><span class="v">${c.M}</span></div>
    </div>`).join("") || `<p style="color:var(--dim); font-size:.88rem;">Nothing lit yet. Understanding, not answers, fills these pages.</p>`}
  <div class="lockedcard">Era II · LABOR — locked. Opens for those who carry 'Choice — the First Price'. Bodhi's two baskets are waiting to be explained.</div>`;
  $("modal").classList.add("on");
}

/* ---------------- boot ---------------- */
window.__test = { S, EXAM, VISION, WS_BLANKS, PROBES, ladder, summarizePlan };
sceneTitle();
</script>
