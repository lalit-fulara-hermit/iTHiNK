<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iTHiNK — Episode 0 · The First Valley (merged)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --night:#070B1D; --midnight:#0B1024; --indigo:#141B36; --royal:#1E2A55; --line:#2A3560;
  --gold:#D4AF37; --goldsoft:#C2A44A; --teal:#1EA896; --sienna:#C26A3D; --amethyst:#8E7BC8;
  --parchment:#EDE6D6; --stone:#A7A9B2; --text:#E8E4D8; --dim:#8A90B0; --ink:#2b2416;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--night); color:var(--text); font-family:'EB Garamond',Georgia,serif; font-size:17px; line-height:1.45; display:flex; justify-content:center;}
button{font-family:inherit; cursor:pointer; border:none; font-size:1rem;}
.cz{font-family:'Cinzel',Georgia,serif;}
#app{width:min(430px,100vw); height:100dvh; display:flex; flex-direction:column; position:relative; overflow:hidden; background:var(--midnight);}

/* ---------- HUD ---------- */
#hud{display:flex; align-items:center; gap:10px; padding:10px 12px 8px; min-height:50px; z-index:5;
     background:linear-gradient(180deg, rgba(7,11,29,.96), rgba(7,11,29,.82) 70%, transparent);
     position:absolute; top:0; left:0; right:0; visibility:hidden;}
.hi-wrap{flex:1; min-width:100px;}
.hi-label{display:flex; justify-content:space-between; font-size:.62rem; letter-spacing:1.6px; color:var(--dim); margin-bottom:4px; text-transform:uppercase; font-family:'Cinzel',serif;}
.hi-track{height:10px; background:rgba(13,18,48,.9); border:1px solid var(--line); border-radius:99px; position:relative; overflow:visible;}
.hi-cur{position:absolute; top:0; bottom:0; left:0; background:linear-gradient(90deg,var(--sienna),var(--gold)); border-radius:99px; transition:width 1.2s ease; box-shadow:0 0 8px rgba(212,175,55,.5);}
.hi-pot{position:absolute; top:-2px; bottom:-2px; width:2px; background:var(--teal); box-shadow:0 0 6px var(--teal); border-radius:2px;}
#chip-charge{font-family:'Cinzel',serif; font-size:.74rem; color:var(--amethyst); letter-spacing:1px; white-space:nowrap; padding:7px 10px; border:1px solid rgba(142,123,200,.4); border-radius:99px; background:rgba(20,27,54,.7);}
#btn-codex{background:rgba(20,27,54,.8); border:1px solid var(--gold); color:var(--gold); border-radius:99px; padding:8px 13px; font-size:.74rem; font-family:'Cinzel',serif; letter-spacing:1px; min-height:36px;}

/* ---------- STAGE ---------- */
#stage{position:absolute; inset:0; z-index:1;}
#stage svg{position:absolute; inset:0; width:100%; height:100%;}
#stage [data-act]{cursor:pointer;}
.cap{font-family:'EB Garamond',serif; font-size:12.5px; fill:#9AA0BD; letter-spacing:.4px;}
.capg{fill:#C2A44A;}
.ring{fill:none; stroke:var(--teal); stroke-width:1.2; stroke-dasharray:4 5; opacity:.75; animation:ringp 2.6s linear infinite; pointer-events:none;}
@keyframes ringp{0%{stroke-dashoffset:0;}100%{stroke-dashoffset:36;}}
.tw{animation:twinkle 2.8s ease-in-out infinite;}
.tw2{animation:twinkle 3.6s ease-in-out infinite 1.3s;}
@keyframes twinkle{0%,100%{opacity:.9;}50%{opacity:.15;}}
.flame{transform-origin:center bottom; animation:flick .9s ease-in-out infinite;}
@keyframes flick{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.18) scaleX(.94);}}
.glow{animation:glowp 2s ease-in-out infinite;}
@keyframes glowp{0%,100%{opacity:.25;}50%{opacity:.6;}}
.smoke{animation:smokeup 3.4s linear infinite; opacity:0;}
@keyframes smokeup{0%{transform:translateY(0); opacity:0;}20%{opacity:.5;}100%{transform:translateY(-46px); opacity:0;}}
.snowl line{stroke:#cdd6f5; stroke-width:1; opacity:.5;}
.snowl{animation:snowfall 1.5s linear infinite;}
@keyframes snowfall{0%{transform:translateY(-14px);}100%{transform:translateY(0);}}
.shimmer{animation:shim 4s ease-in-out infinite;}
@keyframes shim{0%,100%{transform:translateX(0); opacity:.5;}50%{transform:translateX(7px); opacity:.9;}}
.flypath{animation:flyb 2.2s ease-in-out infinite alternate;}
@keyframes flyb{0%{transform:translate(0,0);}100%{transform:translate(6px,-5px);}}
.fadein{animation:fadein .5s ease;}
@keyframes fadein{from{opacity:0; transform:translateY(6px);}to{opacity:1; transform:none;}}
.shake{animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

/* ---------- INSIGHT TRAY ---------- */
#tray{position:absolute; left:0; right:0; z-index:4; display:none; gap:6px; overflow-x:auto; padding:6px 12px;
      scrollbar-width:none; -webkit-overflow-scrolling:touch;}
#tray::-webkit-scrollbar{display:none;}
#tray.on{display:flex;}
.ins{flex:0 0 auto; font-size:.78rem; color:var(--teal); border:1px solid rgba(30,168,150,.5); background:rgba(7,11,29,.8); border-radius:99px; padding:5px 12px; animation:fadein .4s;}

/* ---------- SHEET ---------- */
#sheet{position:absolute; left:0; right:0; bottom:0; z-index:6; max-height:52%; overflow-y:auto;
  background:linear-gradient(180deg, rgba(14,21,51,.97), rgba(9,13,34,.99));
  border-top:1px solid rgba(212,175,55,.35); border-radius:20px 20px 0 0;
  padding:14px 14px calc(14px + env(safe-area-inset-bottom)); backdrop-filter:blur(6px);}
#sheet:empty{display:none;}
.dline{cursor:pointer;}
.who{display:inline-block; font-size:.64rem; font-weight:700; letter-spacing:1.6px; padding:3px 10px; border-radius:99px; margin-bottom:7px; font-family:'Cinzel',serif;}
.who.aadi{background:rgba(212,175,55,.15); color:var(--gold);}
.who.shyam{background:rgba(142,123,200,.18); color:var(--amethyst);}
.who.narr{background:rgba(167,169,178,.13); color:var(--stone);}
.who.tali{background:rgba(237,230,214,.13); color:var(--parchment);}
.who.world{background:rgba(30,168,150,.16); color:var(--teal);}
.dtxt{display:block; font-size:1.06rem;}
.adv{float:right; color:var(--dim); font-size:1rem; margin-top:-2px;}
.choices{display:flex; flex-direction:column; gap:8px;}
.choice{background:linear-gradient(180deg,#243263,#1B2650); border:1px solid var(--line); color:var(--text);
  padding:13px 15px; border-radius:12px; text-align:left; font-size:1.02rem; min-height:48px;}
.choice:active{border-color:var(--gold);}
.choice:disabled{opacity:.35;}
.choice.ghost{background:transparent; border:1px solid var(--line); color:var(--stone); font-size:.9rem;}
.choice.gold{border-color:rgba(212,175,55,.6); color:var(--gold);}
.choice.viol{border-color:rgba(142,123,200,.55); color:var(--amethyst);}

/* ---------- PLAN PANEL ---------- */
.panel-title{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; flex-wrap:wrap; gap:4px;}
.pt{font-size:.72rem; letter-spacing:1.8px; text-transform:uppercase; color:var(--gold); font-family:'Cinzel',serif;}
.hands{font-size:.85rem; color:var(--stone);}
.stores{display:flex; gap:8px; margin:8px 0 4px;}
.stbox{flex:1; background:rgba(13,18,48,.7); border:1px solid var(--line); border-radius:9px; padding:6px 8px;}
.stbox .sl{font-size:.6rem; letter-spacing:1.2px; text-transform:uppercase; color:var(--dim); font-family:'Cinzel',serif;}
.stbox .sv{font-size:.9rem; color:var(--text);}
.stbox .sb{height:5px; background:#0d1230; border-radius:99px; margin-top:4px; overflow:hidden;}
.stbox .sf{height:100%; background:var(--teal); border-radius:99px; transition:width .8s;}
.prow{display:flex; align-items:center; gap:8px; padding:8px 0; border-top:1px solid rgba(42,53,96,.55);}
.pname{flex:1; line-height:1.25;}
.pname .nm{font-size:.98rem; color:var(--text);}
.pname .yl{display:block; font-size:.82rem; color:var(--dim); font-style:italic;}
.ctr{display:flex; align-items:center; gap:6px;}
.ctr button{width:42px; height:42px; border-radius:10px; background:var(--royal); color:var(--text); border:1px solid var(--line); font-size:1.3rem; line-height:1;}
.ctr button:disabled{opacity:.28;}
.ctr .n{width:20px; text-align:center; font-size:1.08rem; color:var(--gold);}
.benchbtn{width:100%; margin-top:6px; background:transparent; border:1px dashed rgba(212,175,55,.5); color:var(--goldsoft); border-radius:11px; padding:11px; font-size:.9rem; min-height:46px;}
.benchbtn.on{border-style:solid; background:rgba(212,175,55,.1);}
.gobtn{flex:1; background:linear-gradient(180deg,#d07a48,#b25c32); color:#1a0e04; font-weight:700; padding:13px 16px;
  font-family:'Cinzel',serif; letter-spacing:1px; font-size:.85rem; min-height:48px; border-radius:12px;}
.gobtn:disabled{opacity:.35;}
.btnrow{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
.gbtn{background:transparent; border:1px solid var(--line); color:var(--stone); padding:10px 14px; font-size:.84rem; border-radius:99px; min-height:44px;}
.gbtn.v{border-color:rgba(142,123,200,.5); color:var(--amethyst);}

/* ---------- LEVEL ACTION CHIPS ---------- */
.acts{display:flex; flex-wrap:wrap; gap:7px;}
.act{background:linear-gradient(180deg,#243263,#1B2650); border:1px solid var(--line); color:var(--text);
  padding:11px 13px; border-radius:11px; font-size:.92rem; min-height:44px; text-align:left;}
.act:disabled{opacity:.35;}
.act.done{border-color:rgba(30,168,150,.5); color:var(--teal);}
.speakbtn{width:100%; margin-top:9px; background:linear-gradient(180deg,#2a5а4c,#1d4a3e); background:linear-gradient(180deg,#22574b,#173f36);
  border:1px solid var(--teal); color:#c9f0e6; padding:13px; border-radius:12px; font-size:1rem; font-family:'Cinzel',serif; letter-spacing:.5px; min-height:50px;}
.hintbtn{width:100%; margin-top:7px; background:transparent; border:1px solid rgba(142,123,200,.45); color:var(--amethyst); padding:11px; border-radius:12px; font-size:.9rem; min-height:46px;}

/* ---------- SPEECH (embodiment / whitestory) ---------- */
.ws{background:linear-gradient(180deg,#F2ECDC,#E7DEC7); color:var(--ink); border-radius:14px; padding:16px 15px; font-size:1rem;
    border:1px solid #c9b98a; box-shadow:0 6px 24px rgba(0,0,0,.5);}
.ws h3{color:#6b5a26; letter-spacing:1.4px; margin-bottom:9px; font-size:.78rem; font-family:'Cinzel',serif;}
.ws .sent{line-height:1.9; margin-bottom:10px;}
.ws .blank{display:inline-block; min-width:70px; border-bottom:2px solid #8a7a4a; color:#8a2f14; font-weight:600; text-align:center; padding:0 4px;}
.ws .dimtag{font-size:.62rem; letter-spacing:1px; text-transform:uppercase; color:#9a8a5a; vertical-align:super; margin-left:3px; font-family:'Cinzel',serif;}
.wchips{display:flex; flex-direction:column; gap:7px;}
.wchip{background:#efe7d2; border:1px solid #b3a67f; color:var(--ink); padding:12px 13px; border-radius:9px; text-align:left; font-size:.95rem; min-height:46px;}
.wchip:active{border-color:#8a2f14;}

/* ---------- MODAL (codex) ---------- */
#modal{display:none; position:fixed; inset:0; background:rgba(4,6,16,.9); z-index:40; justify-content:center; align-items:center; padding:14px;}
#modal.on{display:flex;}
.card{background:linear-gradient(180deg,#161e42,#101733); border:1px solid var(--amethyst); border-radius:16px; max-width:430px; width:100%; padding:18px; max-height:84vh; overflow:auto;}
.card h3{color:var(--amethyst); margin-bottom:8px; letter-spacing:1px; font-family:'Cinzel',serif; font-size:1rem;}
.cipm-row{display:flex; gap:9px; margin:7px 0; font-size:.93rem;}
.cipm-row .k{flex:0 0 26px; height:26px; border-radius:8px; background:var(--royal); border:1px solid var(--amethyst); color:var(--amethyst); font-weight:800; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:.85rem;}
.cipm-row .v{color:var(--stone); padding-top:2px;}

/* ---------- TITLE ---------- */
#title{position:absolute; inset:0; z-index:30; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  background:radial-gradient(120% 90% at 50% 20%, #14204a 0%, #0B1024 55%, #070B1D 100%); padding:28px;}
#title .logo{font-family:'Cinzel',serif; font-size:2rem; letter-spacing:6px; color:var(--gold); text-shadow:0 0 24px rgba(212,175,55,.45); font-weight:800;}
#title .tag{font-size:.72rem; letter-spacing:3px; color:var(--dim); font-family:'Cinzel',serif; text-align:center;}
#title input{width:min(280px,80vw); background:transparent; border:none; border-bottom:1.5px solid rgba(212,175,55,.5); color:var(--text);
  font-family:'EB Garamond',serif; font-size:1.15rem; padding:10px 4px; text-align:center; outline:none;}
#title input::placeholder{color:#5a628a;}
#title .begin{background:linear-gradient(180deg,#e3c257,#b8952c); color:#1a1204; font-family:'Cinzel',serif; letter-spacing:2px;
  font-weight:700; padding:14px 42px; border-radius:99px; font-size:.9rem; min-height:50px;}
.hr{width:min(240px,60vw); height:1px; background:linear-gradient(90deg,transparent,rgba(212,175,55,.6),transparent);}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hi-wrap">
      <div class="hi-label"><span id="hiname">—</span><span><span id="hival">0</span> / <span id="hipotv">0</span></span></div>
      <div class="hi-track"><div class="hi-cur" id="hicur" style="width:0%"></div><div class="hi-pot" id="hipot" style="left:0%"></div></div>
    </div>
    <span id="chip-charge">✧ 0</span>
    <button id="btn-codex" onclick="openCodex()">CODEX <span id="codexn">0</span></button>
  </div>
  <div id="stage"></div>
  <div id="tray"></div>
  <div id="sheet"></div>
  <div id="modal" onclick="this.classList.remove('on')"><div class="card" id="cardbox" onclick="event.stopPropagation()"></div></div>
  <div id="title">
    <div class="logo">iTHiNK</div>
    <div class="tag">THE GAME<br><span style="letter-spacing:1.5px; font-size:.62rem;">LEARN ANYTHING · UNDERSTAND EVERYTHING</span></div>
    <div class="hr"></div>
    <input id="pname" type="text" placeholder="your name" autocomplete="off">
    <button class="begin" onclick="doBegin()">STEP IN</button>
    <div class="tag" style="opacity:.6">EPISODE 0 · THE FIRST VALLEY</div>
  </div>
</div>
<script>
/* ================= SIM (verified math from v12 — tech-downgrade fixed) ================= */
const SIM = {
  HANDS: 8, MOONS: 3,
  NEED: { food: 120, fuel: 40, shelter: 15 },
  SITES: {
    grove:  { label:"the fruit grove",     per:12 },
    roots:  { label:"the root field",      per:7 },
    river:  { label:"the river",           per:9, smokeFuel:2 },
    forest: { label:"the deadwood forest", per:8 },
    huts:   { label:"the huts" }
  }
};
function freshTech(){ return { fruitKeep:0.3, fruitFuelFlat:0, hutPer:5, bestDry:0.3 }; }
function computeMoon(alloc, push, exhausted, fuelStore, tech){
  const m = (push?1.3:1) * (exhausted?0.6:1);
  const a = k => alloc[k]||0;
  const out = { fruitGathered:0, fruitKept:0, fruitRot:0, fishRaw:0, fishKept:0, fishRot:0,
                smokeUsed:0, roots:0, wood:0, hutwork:0, gained:{food:0,fuel:0,shelter:0} };
  out.fruitGathered = Math.round(a("grove")*SIM.SITES.grove.per*m);
  out.roots = Math.round(a("roots")*SIM.SITES.roots.per*m);
  out.wood  = Math.round(a("forest")*SIM.SITES.forest.per*m);
  out.hutwork = Math.round(a("huts")*tech.hutPer*m);
  out.fishRaw = Math.round(a("river")*SIM.SITES.river.per*m);
  let avail = fuelStore + out.wood;
  if(a("river")){
    const cost = SIM.SITES.river.smokeFuel * a("river");
    if(avail >= cost){ out.fishKept = out.fishRaw; out.smokeUsed = cost; }
    else { const hands = Math.floor(avail/SIM.SITES.river.smokeFuel);
           out.fishKept = Math.round(out.fishRaw*hands/a("river"));
           out.smokeUsed = hands*SIM.SITES.river.smokeFuel;
           out.fishRot = out.fishRaw - out.fishKept; }
    avail -= out.smokeUsed;
  }
  let keep = tech.fruitKeep;
  if(a("grove") && tech.fruitFuelFlat>0){
    if(avail >= tech.fruitFuelFlat){ out.smokeUsed += tech.fruitFuelFlat; avail -= tech.fruitFuelFlat; }
    else { keep = tech.bestDry; } /* FIX: falls back to best fuel-free way ever learned, never to raw 0.3 */
  }
  out.fruitKept = Math.round(out.fruitGathered*keep);
  out.fruitRot = out.fruitGathered - out.fruitKept;
  out.gained.food = out.roots + out.fishKept + out.fruitKept;
  out.gained.fuel = out.wood - out.smokeUsed;
  out.gained.shelter = out.hutwork;
  return out;
}
function winterVerdict(st){
  return { food: st.food>=SIM.NEED.food, fuel: st.fuel>=SIM.NEED.fuel, shelter: st.shelter>=SIM.NEED.shelter,
           pass: st.food>=SIM.NEED.food && st.fuel>=SIM.NEED.fuel && st.shelter>=SIM.NEED.shelter };
}

/* ================= LAWS ================= */
const LAWS = {
  eats:  "Rot is alive — something small is eating the flesh.",
  water: "Rot drinks water. Dry things do not blacken.",
  air:   "Rot breathes air. What is sealed, keeps.",
  cold:  "Cold slows every small worker — it stops none of them.",
  sun:   "The sun takes the water out of whatever lies under it.",
  smoke: "Smoke takes water and coats against air — and drinks wood for it.",
  earth: "The earth is cool — but damp. Damp is rot's mother.",
  gaps:  "Wind and water enter through gaps. Close the gap, close the door.",
  reeds: "Reeds woven tight hold against pull and wind.",
  ashlaw:"Ash fills gaps while dry — and runs like grey soup when wet.",
  wood:  "Wood burns once. Every improvement that burns is a standing bill.",
  fit:   "A tool that serves one flesh can ruin another. Fit before copy.",
  scale: "A cure that covers one basket in ten is a story, not a way.",
  turn:  "Some spoilings are not endings. Rot turned right becomes a new keeping.",
  price: "The true price of anything is what you gave up to get it."
};

/* ================= SCENE ART (layered, refined) ================= */
const DEFS = `<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#060917"/><stop offset=".5" stop-color="#0E1533"/><stop offset="1" stop-color="#1E2B58"/>
  </linearGradient>
  <linearGradient id="skyDusk" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0A0E22"/><stop offset=".55" stop-color="#1B2650"/><stop offset="1" stop-color="#4a3050"/>
  </linearGradient>
  <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1E2A55"/><stop offset="1" stop-color="#121A3C"/>
  </linearGradient>
  <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1d5a74"/><stop offset="1" stop-color="#123246"/>
  </linearGradient>
  <radialGradient id="moonhalo"><stop offset="0" stop-color="#dfe4f8" stop-opacity=".9"/><stop offset=".4" stop-color="#dfe4f8" stop-opacity=".18"/><stop offset="1" stop-color="#dfe4f8" stop-opacity="0"/></radialGradient>
  <radialGradient id="canopy"><stop offset="0" stop-color="#2c6a52"/><stop offset="1" stop-color="#173d30"/></radialGradient>
  <radialGradient id="firelight"><stop offset="0" stop-color="#FFD98E" stop-opacity=".55"/><stop offset="1" stop-color="#FFD98E" stop-opacity="0"/></radialGradient>
  <radialGradient id="sunpool"><stop offset="0" stop-color="#e8c95a" stop-opacity=".5"/><stop offset="1" stop-color="#e8c95a" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".42" r=".8">
    <stop offset=".55" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity=".6"/>
  </radialGradient>
  <filter id="soft"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>`;
const VIG = `<rect width="390" height="520" fill="url(#vig)" style="pointer-events:none"/>`;
function svgWrap(inner){ return `<svg viewBox="0 0 390 520" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">${DEFS}${inner}${VIG}</svg>`; }
function stars(){ return `<g><circle cx="46" cy="64" r="1.3" fill="#EDE6D6" class="tw"/><circle cx="150" cy="40" r="1" fill="#EDE6D6" class="tw2"/>
  <circle cx="292" cy="58" r="1.2" fill="#EDE6D6" class="tw"/><circle cx="348" cy="96" r="1" fill="#EDE6D6" class="tw2"/>
  <circle cx="220" cy="84" r="1" fill="#EDE6D6" class="tw"/><circle cx="96" cy="110" r="1.1" fill="#EDE6D6" class="tw2"/></g>`; }
function moon(x,y,r){ return `<circle cx="${x}" cy="${y}" r="${r*2.6}" fill="url(#moonhalo)"/><circle cx="${x}" cy="${y}" r="${r}" fill="#e6eafb"/><circle cx="${x-r*.45}" cy="${y-r*.2}" r="${r}" fill="url(#sky)" opacity=".92"/>`; }
function ridges(){ return `
  <path d="M0,232 Q70,168 150,214 Q200,240 240,214 Q320,166 390,222 L390,300 L0,300 Z" fill="#0E1531"/>
  <path d="M0,262 Q90,214 190,252 Q290,288 390,248 L390,330 L0,330 Z" fill="#141B36"/>`; }
function tree(x,y,s,fruit){
  let f='';

const $ = id => document.getElementById(id);
const stage = $("stage"), sheet = $("sheet"), tray = $("tray");
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function setStage(inner){ stage.innerHTML = inner; layoutTray(); }
function layoutTray(){ tray.style.bottom = (sheet.offsetHeight||0) + 4 + "px"; }
new ResizeObserver(layoutTray).observe(sheet);

/* ---------------- HUD ---------------- */
function hud(on, name){
  $("hud").style.visibility = on?"visible":"hidden";
  if(name) $("hiname").textContent = name;
  $("hival").textContent = Math.round(S.hi); $("hipotv").textContent = S.pot;
  $("hicur").style.width = S.hi+"%"; $("hipot").style.left = S.pot+"%";
  $("codexn").textContent = S.cards.length;
  $("chip-charge").textContent = "✧ "+S.charge;
}
function raiseHI(to){ S.hi = Math.min(S.pot, Math.max(S.hi, to)); hud(true); }
function earnCharge(n){ S.charge = Math.min(5, S.charge+n); hud(true); }
function spendCharge(){ if(S.charge<=0) return false; S.charge--; hud(true); return true; }
function seeLaw(id){ if(!S.lawsSeen[id]){ S.lawsSeen[id]=true; } }
function ownLaw(id){ seeLaw(id); S.lawsOwned[id]=true; hud(true); }

/* ---------------- dialogue ---------------- */
const NAMES = {aadi:"YOU", shyam:"SHYAM", narr:"—", tali:"THE TALISMAN", world:"THE WORLD"};
let q=[], qDone=null;
function say(lines, done){ q=lines.slice(); qDone=done||null; nextLine(); }
function nextLine(){
  if(!q.length){ sheet.innerHTML=""; layoutTray(); if(qDone){ const f=qDone; qDone=null; f(); } return; }
  const l=q.shift();
  sheet.innerHTML = `<div class="dline fadein" onclick="nextLine()">
    <span class="who ${l.who}">${NAMES[l.who]}</span><span class="adv">▸</span>
    <span class="dtxt">${l.t}</span></div>`;
  layoutTray();
}
let CH=[];
function choices(list){
  CH=list;
  sheet.innerHTML = `<div class="choices fadein">`+list.map((c,i)=>
    `<button class="choice ${c.cls||''}" ${c.off?'disabled':''} onclick="pickC(${i})">${c.t}</button>`).join("")+`</div>`;
  layoutTray();
}
function pickC(i){ CH[i].fn(); }

/* ---------------- insights tray ---------------- */
let INS = {};
function clearInsights(){ INS={}; tray.classList.remove("on"); tray.innerHTML=""; }
function insight(key, text, law){
  if(INS[key]) return false;
  INS[key]=text; if(law) seeLaw(law);
  tray.classList.add("on");
  tray.innerHTML = Object.values(INS).map(t=>`<span class="ins">◆ ${t}</span>`).join("");
  layoutTray();
  return true;
}

/* stage hotspot delegation */
stage.addEventListener("click", e=>{
  let t=e.target;
  while(t && t!==stage && !(t.getAttribute && t.getAttribute("data-act"))) t=t.parentNode;
  if(t && t!==stage && t.getAttribute && S.actHandler) S.actHandler(t.getAttribute("data-act"));
});

/* ================= FLOW: TITLE → EXILE → VALLEY ================= */
function doBegin(){
  S.name = ($("pname").value||"").trim() || "the traveler";
  $("title").style.display="none";
  sceneExile();
}
function sceneExile(){
  S.scene="exile"; hud(false); S.actHandler=null; clearInsights();
  setStage(gateCityScene());
  say([
    {who:"narr", t:"You have never missed a question in your life. Tonight you graduate first in the City of Answers — until the Gatekeeper asks the one question with no button under it: <i>WHY is anything scarce at all?</i>"},
    {who:"world", t:`THE GATEKEEPER, quietly: "You have every answer, Aadi. You own none of them. The City has no use for a mirror."`},
    {who:"narr", t:"The verdict is exile. Over the gate, the terms of return: COME BACK WHEN YOU CAN EXPLAIN, NOT RECITE."},
    {who:"tali", t:`"Awake at last, boy? Then hear me once: where you walk now, the land speaks to whoever carries me. Solve what the road sets before you and I fill with charge — spend me, and even deeper things will be shown."`},
    {who:"narr", t:"As the gate swings shut, something falls into step beside you. You turn. The road is empty."},
    {who:"shyam", t:`"Call me Shyam. Are you going to stand here, or is there a road?"`}
  ], sceneValley);
}
function sceneValley(){
  S.scene="valley"; hud(true, "The First Valley");
  setStage(valleyScene());
  say([
    {who:"narr", t:"Days later: a green valley, a band of eight, huts by a river. They take the travelers in without questions — there is soup, and a place by the fire."},
    {who:"world", t:`THE ELDER, by the fire: "Winter. Every year the valley gives plenty, and every year we reach spring hungry. We work from first light. It is never enough."`},
    {who:"tali", t:`"Feel it through me, boy: this valley's happiness stands at 38 of a possible 90. Enough EXISTS here. Something else is broken. Touch the places that glow — the land is waiting to talk."`},
    {who:"shyam", t:`"'We work hard,' the elder says. Is 'hard' the same as 'right'?"`}
  ], exploreValley);
}

const TELLS = {
  grove:{t:`THE GROVE: "Sweet and fast — a hand picks twelve measures a moon, easiest work in the valley. But hear me plainly: my fruit does not keep. Seven parts in ten will blacken before deep winter… the old way."`, law:null},
  roots:{t:`THE ROOT FIELD: "Knobbly, dull, patient. A hand digs seven measures a moon. Dry them and they keep till spring — the humblest thing here, and the most loyal."`, law:"sun"},
  river:{t:`THE RIVER: "A hand nets nine measures a moon — but fish rots in days unless it is SMOKED, and smoking one hand's catch eats two measures of firewood. I give with one hand and charge with the other."`, law:"wood"},
  forest:{t:`THE DEADWOOD FOREST: "Dead branches free for the hauling — eight measures of firewood a hand, each moon. Firewood is winter's blood. And the smokehouse drinks it too."`, law:"wood"},
  huts:{t:`THE OLD HUT: "My roofs are tired. Wind slides in like a thief. A hand patches five measures a moon, the old way. Fifteen patches stand between the children and the cold."`, law:"gaps"}
};
function exploreValley(){
  S.scene="valley"; setStage(valleyScene());
  S.actHandler = a => { if(TELLS[a] && !S.examined[a]){ S.favorDone? tellSite(a) : gateFavor(a); } };
  const seen = Object.keys(S.examined).length;
  const opts = [];
  if(seen<5) opts.push({t:"— touch the glowing places on the land —", off:true, cls:"ghost", fn:()=>{}});
  if(S.favorDone && seen>=3) opts.push({t:"Enough walking — gather the band. We plan ▸", cls:"gold", fn:startPlanning});
  choices(opts);
}
function gateFavor(k){
  say([
    {who:"narr", t:"Before you take three steps toward it, the whole valley goes still. A voice moves under things like a slow wave."},
    {who:"world", t:`THE OLD TREE: "Taking, first? Tell me, boy — does nature give you breath for free? You drink the air and pay it back with every breath. Everything here is exchange. What will YOU give?"`},
    {who:"aadi", t:"I— I have answers. Nobody out here charges in answers."}
  ], ()=>{
    choices(shuffle([
      {t:"Bury one fruit at the field's edge — what is taken must send roots back.", fn:()=>doFavor(k)},
      {t:"Recite the definition of exchange at it, word for word.", fn:()=>{
        say([{who:"world", t:`THE OLD TREE: "Words. The wind brings me words all day, and none of them ever grew into anything. Try again."`}], ()=>gateFavor(k));
      }}
    ]));
  });
}
function doFavor(k){
  S.favorDone=true; S.needsKnown=true; raiseHI(42); earnCharge(1);
  say([
    {who:"narr", t:"You kneel and bury the fruit whole, seeds and all. The tree is quiet for a long moment."},
    {who:"world", t:`THE OLD TREE: "Good. Then I will tell you what the elder cannot count. Before the last leaf falls, this band needs: ONE HUNDRED AND TWENTY measures of food. FORTY of firewood. FIFTEEN patches on the huts. Less, and winter collects the difference from the children."`},
    {who:"world", t:`"You have eight hands and three moons. Twenty-four hand-moons. That is your whole purse, boy — the only coin that has ever existed."`},
    {who:"shyam", t:`"Twenty-four. Will you still remember that number when the piles start looking big?"`}
  ], ()=>tellSite(k));
}
function tellSite(k){
  S.examined[k]=true; if(TELLS[k].law) seeLaw(TELLS[k].law);
  say([{who:"world", t:TELLS[k].t}], ()=>{
    if(k==="grove"){ insight("rotwarn","fruit: 12/hand — 7 of 10 rot, the old way"); }
    exploreValley();
  });
}

/* ================= PLANNING ================= */
function yieldText(k){
  if(k==="grove"){
    if(S.rotSolved==="smoke") return "12 food/hand — smoked: 19 of 20 keep · drinks 2 wood/moon";
    if(S.rotSolved==="sun") return "12 food/hand — sun-dried: 9 of 10 keep";
    return "12 food/hand — 7 of 10 rot, the old way";
  }
  if(k==="roots") return "7 food/hand — stores well";
  if(k==="river") return "9 food/hand — smoking eats 2 firewood per hand";
  if(k==="forest") return "8 firewood/hand";
  if(k==="huts") return S.roofSolved? "9 patches/hand — reed-woven, the new way" : "5 patches/hand, the old way";
  return "";
}
function handsUsed(){ return Object.values(S.alloc).reduce((a,b)=>a+b,0) + (S.bench?1:0); }
function startPlanning(){
  S.scene="plan"; S.actHandler=null;
  setStage(valleyScene());
  if(S.moon===1 && S.season===1){
    say([
      {who:"aadi", t:"Right. My plan: everyone to the grove. Twelve a moon each — biggest number in the valley. Numbers are the one thing I'm good at… unless you see something I don't?"},
      {who:"shyam", t:`"Before you spend — whatever you choose, can you name what you are choosing to LOSE?"`}
    ], showPlan);
  } else if(S.moon>=2){
    const unused = ELDERPLANS.filter(p=>!S.plansUsed[p.id]);
    if(unused.length) elderScene(unused[0]); else showPlan();
  } else showPlan();
}
function showPlan(){
  S.scene="plan";
  const rows = Object.keys(SIM.SITES).map(k=>{
    const seen = S.examined[k];
    return `<div class="prow">
      <div class="pname"><span class="nm">${SIM.SITES[k].label.replace(/^the /,"The ")}</span>
        <span class="yl">${seen? yieldText(k) : "walk the land to learn its offer"}</span></div>
      <div class="ctr">
        <button onclick="decA('${k}')" ${!S.alloc[k]?"disabled":""}>−</button>
        <span class="n">${S.alloc[k]||0}</span>
        <button onclick="incA('${k}')" ${(!seen||handsUsed()>=SIM.HANDS)?"disabled":""}>+</button>
      </div></div>`;
  }).join("");
  const benchAvail = (S.moon>1 || S.season>1) && (!S.rotSolved || !S.roofSolved);
  const st = ["food","fuel","shelter"].map(k=>{
    const need=SIM.NEED[k];
    return `<div class="stbox"><div class="sl">${k==="shelter"?"patches":k}</div><div class="sv">${S.store[k]} / ${S.needsKnown?need:"?"}</div>
      <div class="sb"><div class="sf" style="width:${Math.min(100,S.store[k]/need*100)}%"></div></div></div>`;
  }).join("");
  sheet.innerHTML = `
    <div class="panel-title"><span class="pt">${["First Moon","Second Moon","Last Moon"][S.moon-1]}${S.season>1?" · season "+S.season:""}${S.exhausted?" · the band is weary":""}</span>
      <span class="hands">free hands: <b style="color:var(--gold)">${SIM.HANDS-handsUsed()}</b>/8</span></div>
    <div class="stores">${st}</div>
    ${rows}
    ${benchAvail? `<button class="benchbtn ${S.bench?'on':''}" onclick="toggleBench()">${S.bench? "⚒ one hand is sparing this moon to THINK — tap to recall it" : "⚒ Spare a hand to attack a problem (costs 1 hand)"}</button>`:""}
    <div class="btnrow">
      <button class="gbtn v" onclick="askShyam()">Ask Shyam</button>
      <button class="gbtn" onclick="startVision()">✦ Why is there never enough?</button>
      <button class="gobtn" onclick="beginMoon()" ${handsUsed()===0?"disabled":""}>Begin the moon</button>
    </div>`;
  layoutTray();
}
function incA(k){ if(handsUsed()<SIM.HANDS){ S.alloc[k]=(S.alloc[k]||0)+1; showPlan(); } }
function decA(k){ if(S.alloc[k]>0){ S.alloc[k]--; showPlan(); } }
function toggleBench(){
  if(S.bench){ S.bench=false; showPlan(); return; }
  if(handsUsed()>=SIM.HANDS){ say([{who:"tali", t:`"Every hand is spoken for, boy. Recall one first."`}], showPlan); return; }
  S.bench=true;
  const probs=[];
  if(!S.rotSolved && (S.fruitRotSeen || S.season>1 || S.moon>1)) probs.push({t:"Attack the fruit that blackens", fn:()=>enterLevel("rot")});
  if(!S.roofSolved) probs.push({t:"Attack the roofs that leak", fn:()=>enterLevel("roofs")});
  say([
    {who:"narr", t:"One hand stands free of the fields this moon, before the valley's oldest problems."},
    {who:"shyam", t:`"A hand that gathers nothing this moon. What must it make instead, to be worth its keep?"`}
  ], ()=>choices(probs.concat([{t:"↩ return the hand to the fields", cls:"ghost", fn:()=>{S.bench=false; showPlan();}}])));
}
function beginMoon(){ runMoon(); }

function elderScene(plan){
  S.plansUsed[plan.id]=true; S.curElderPlan=plan;
  setStage(valleyScene());
  say([
    {who:"world", t:plan.intro},
    {who:"shyam", t:`"Before you nod at an elder — does his plan LIE anywhere? Tap the line that does. Or call it sound, and live with it."`}
  ], ()=>offerLines(plan,0));
}
function offerLines(plan,taps){
  choices(plan.lines.map(l=>({t:'"'+l.t+'"', fn:()=>{
    if(l.flaw) askWhy(plan,taps);
    else say([{who:"world", t:`THE VALLEY: "That line holds. ${taps>=1?"You are tapping, not thinking. Count what each line PAYS and what it LOSES.":"Look again."}"`}], ()=>offerLines(plan,taps+1));
  }})).concat([{t:"The plan is sound — run it as the elder says.", cls:"ghost", fn:()=>{
    S.missedFlaw=true; S.alloc={...plan.alloc};
    say([{who:"shyam", t:`"Nodded through, then. Shall we let the dusk read it back to us?"`}], runMoon);
  }}]));
}
function askWhy(plan,taps){
  say([{who:"world", t:plan.whyQ}], ()=>{
    choices(shuffle(plan.whyOpts).map(o=>({t:o.t, fn:()=>{
      if(o.ok){
        S.log.critFound++; earnCharge(1);
        say([
          {who:"world", t:`THE VALLEY: "Named, and priced. The elder is silent — the way a man is silent when the numbers turn on him."`},
          {who:"world", t:`THE ELDER, finally: "…Then move the hands yourself, traveler. Show me."`}
        ], ()=>{ S.alloc={...plan.alloc}; S.missedFlaw=false; S.curElderPlan=null; showPlan(); });
      } else {
        S.log.probeRetries++;
        say([{who:"world", t:`THE VALLEY: "No — that is a story about the flaw, not the flaw. Stand in the numbers and answer again."`}], ()=>askWhy(plan,taps));
      }
    }})));
  });
}
/* ================= MOON RESOLUTION ================= */
function runMoon(){
  const push = S.pushPlanned; S.pushPlanned=false;
  const alloc = {...S.alloc};
  const res = computeMoon(alloc, push, S.exhausted, S.store.fuel, S.tech);
  S.log.plans.push({season:S.season, moon:S.moon, alloc, push, bench:S.bench});
  if(push) S.log.pushes++;
  const wasExhausted = S.exhausted; S.exhausted = push;
  S.store.food += res.gained.food; S.store.fuel += res.gained.fuel; S.store.shelter += res.gained.shelter;
  S.log.fruitRotTotal += res.fruitRot; S.log.fishRotTotal += res.fishRot;
  if(res.fruitRot>0) S.fruitRotSeen = true;
  S.bench=false;
  const beats=[];
  if(wasExhausted){
    beats.push({who:"narr", t:"The band moves like wet rope this moon — last moon's pushing is being repaid, with interest."});
    const pred=S.pushPrediction;
    if(pred==="borrow") beats.push({who:"world", t:`THE VALLEY, in the dragging of feet: "You named it before you spent it — BORROWED. Here is the collection. Strength is a store like any other."`});
    else if(pred) beats.push({who:"world", t:`THE VALLEY: "You said ${pred==="free"?"effort was free":"I would simply give more"}. Look at the band. The extra came from THIS moon — pushing does not create strength, it moves it."`});
  }
  if(alloc.grove) beats.push({who:"narr", t:`The grove: ${res.fruitGathered} measures picked${res.fruitRot?` — and by moon's end, <b>${res.fruitRot} lie blackened</b> in the baskets. ${res.fruitKept} survive`:` — ${res.fruitKept} kept`}.`});
  if(alloc.roots) beats.push({who:"narr", t:`The root field: ${res.roots} measures dug, dried, stored. They will not betray you.`});
  if(alloc.river) beats.push({who:"narr", t:`The river: ${res.fishRaw} netted, ${res.fishKept} smoked and saved${res.smokeUsed?` (the smokehouse ate ${res.smokeUsed} firewood)`:""}${res.fishRot?`; <b>${res.fishRot} ROT unsmoked — the wood ran out</b>`:""}.`});
  if(alloc.forest) beats.push({who:"narr", t:`The forest: ${res.wood} measures of firewood hauled.`});
  if(alloc.huts) beats.push({who:"narr", t:`The huts: ${res.hutwork} patches set against the wind.`});
  if(push) beats.push({who:"narr", t:"The band worked past dusk every day. It shows in the piles — and in their faces. Something was borrowed this moon."});
  if(S.missedFlaw && S.curElderPlan){
    beats.push({who:"world", t:S.curElderPlan.dusk});
    beats.push({who:"shyam", t:`"He is an elder, and he was wrong, and you nodded. Which of the three of you does that number belong to?"`});
    S.log.critMissed++; S.missedFlaw=false; S.curElderPlan=null;
  }
  say(beats, ()=>{ S.rung=0; afterMoon(alloc,res,push); });
}
function paceShort(){
  const f = S.moon/SIM.MOONS;
  return ["food","fuel","shelter"].filter(k=> S.store[k] < SIM.NEED[k]*f);
}
function afterMoon(alloc,res,push){
  const short = paceShort(), onPace = short.length===0;
  if(onPace) raiseHI(42 + S.moon*4);
  const lines=[];
  if(onPace) lines.push({who:"aadi", t: S.moon<3? "Look at the store. LOOK at it. In the City I never once saw a number I'd carried myself…" : "The store is fat and the roofs are tight. Now we find out what winter thinks of our arithmetic."});
  else {
    lines.push({who:"narr", t:`(At this pace, ${short.join(" and ")} will fall short of winter's mark.)`});
    lines.push(shyamAfterMoon(alloc,res,push));
  }
  say(lines, ()=>{
    const adv = ()=>{
      if(S.moon<SIM.MOONS){ S.moon++; S.alloc={grove:0,roots:0,river:0,forest:0,huts:0}; startPlanning(); }
      else winterCommit();
    };
    if(S.moon===1 && S.season===1 && !S.trapDone) ceilingAndTrap(adv); else adv();
  });
}
function shyamAfterMoon(alloc,res,push){
  if(res.fruitRot>=25) return {who:"shyam", t:`"The grove paid you ${res.fruitGathered} and your baskets kept ${res.fruitKept}. Who ate the difference? And is picking MORE the only answer — or is there a hand that could stop the eating itself?"`};
  if(res.fishRot>0) return {who:"shyam", t:`"The river gave ${res.fishRaw} and the smokehouse saved ${res.fishKept}. What does smoke cost — and who forgot to pay it?"`};
  if(push) return {who:"shyam", t:`"Bigger piles today. Where did this moon's extra strength come from? Was it free?"`};
  return {who:"shyam", t:`"What will you STOP doing next moon? And what has no hand tried YET?"`};
}
function ceilingAndTrap(adv){
  S.trapDone=true;
  say([
    {who:"world", t:`THE VALLEY, at moonset: "Count with me, boy, before you plan again. Put every hand in its best OLD place and push the sums as hard as you like — the old ways top out SHORT of winter's mark. Every year this band has run at a wall, and every year the wall has stood."`},
    {who:"shyam", t:`"So moving hands between old places cannot be the whole answer. What kind of move is LEFT — if adding is not one, and moving is not one?"`},
    {who:"world", t:`THE ELDER, gripping his staff: "There is one more way, travelers — the way we always try at the end: work the band past dusk. Sweat is free. Say yes, and next moon we push."`}
  ], ()=>{
    say([{who:"shyam", t:`"Before you answer him — if the band pushes next moon, where will the EXTRA strength come from?"`}], ()=>{
      choices(shuffle([
        {t:"Nowhere it costs — effort is free wherever the will is strong.", fn:()=>trapDecide("free",adv)},
        {t:"The valley itself gives more to those who ask it harder.", fn:()=>trapDecide("valley",adv)},
        {t:"From the moon after — pushing borrows its strength from tomorrow.", fn:()=>trapDecide("borrow",adv)}
      ]));
    });
  });
}
function trapDecide(pred,adv){
  S.pushPrediction=pred; S.log.predLedger.push({what:"push", said:pred, got:"borrow"});
  say([{who:"world", t:`THE ELDER: "Well? Do we push the band next moon, or not?"`}], ()=>{
    choices([
      {t:"Push. Let the second moon run past dusk.", fn:()=>{ S.pushPlanned=true;
        say([{who:"tali", t:`"Committed, boy — and I will keep the score. The third moon will read it back."`}], adv); }},
      {t:"No. The wall is not made of hours — we look for another way.", fn:()=>{
        say([
          {who:"world", t:`THE ELDER, quietly: "No one has ever said no to me on this. …What other way IS there?"`},
          {who:"shyam", t:`"Good question, old one. Is there a place in this valley where a hand could gather nothing — and still feed everyone?"`}
        ], adv); }}
    ]);
  });
}

/* ================= SHYAM LADDER (questions only) ================= */

     return `"Before you choose — whatever you pick, can you name what you are NOT picking?"`; },

   ok:"It stops existing the moment I choose — it does not wait.",

   c:`THE WIND: "…gone the moment you turned. Now you know what a choice costs…"`},
  {q:()=>`"Count with me, slowly. Eight hands, three moons — how big is the purse? And what must it buy, all of it, before the snow?"`,
   ok:"Twenty-four — and it must buy food, wood and roofs, all three.",
   no:"Twenty-four — and food alone decides the winter.",
   c:`THE WIND: "…one purse, three hungers. Spend like you know it…"`},
  {q:()=>`"On the road here we came to a fork, and you took the left path. Where did the right one go?"`,

   c:`THE WIND, almost a word: "…the price… the price…"`}

function askShyam(){
  S.log.asks++;
  const r = Math.min(S.rung, RUNGS.length-1), R = RUNGS[r];
  say([{who:"shyam", t:R.q()}], ()=>{
    choices(shuffle([
      {t:R.ok, fn:()=>{ S.log.rungOK++; S.rung=0; ownLaw("price"); say([{who:"world", t:R.c}], showPlan); }},
      {t:R.no, fn:()=>{ S.log.rungMiss++; S.rung=Math.min(r+1,RUNGS.length-1);
        say([{who:"world", t:`THE VALLEY: "Look once more at your own piles before you say that twice."`},
             {who:"tali", t:`"Lower, then. He will meet you where you actually stand — that is his one kindness."`}], askShyam); }}
    ]).concat([{t:"I don't know — take me lower.", cls:"ghost", fn:()=>{
      S.rung=Math.min(r+1,RUNGS.length-1);
      say([{who:"tali", t:`"Honest. Honest is faster than clever, boy."`}], askShyam); }}]));
  });
}

/* ================= VISION (learner-built chain) ================= */
const VSTEPS = [
  "This valley — one green bowl in a ring of rock; count its trees, you would finish counting",
  "The earth — one ball of rock and water, lit on one side; it has never once grown",
  "The sun — a purse of fire, spending itself thinner with every heartbeat",
  "0 — matter, energy, time: issued once at the beginning, never reissued"
];
let vIdx=0;
function startVision(){
  vIdx=0; S.actHandler=null;
  setStage(svgWrap(`<rect width="390" height="520" fill="url(#sky)"/>${stars()}
    <circle cx="195" cy="230" r="12" fill="#D4AF37"/><circle cx="195" cy="230" r="46" fill="#D4AF37" opacity=".28" class="glow"/>
    <circle cx="195" cy="230" r="104" fill="#8E7BC8" opacity=".14" class="glow"/>
    <text x="195" y="237" text-anchor="middle" font-size="19" font-weight="800" fill="#EDE6D6" font-family="Cinzel,serif">0</text>
    <text x="195" y="30" text-anchor="middle" font-size="11" letter-spacing="3" fill="#8E7BC8" font-family="Cinzel,serif">VISION · BUILD THE CHAIN</text>`));
  say([{who:"tali", t:`"No — I will not show you the answer. I hand you the LINKS. Build the chain yourself, from where you stand back to 0. Tap them in order — nearest first."`}], drawVision);
}
function drawVision(){
  const order = shuffle(VSTEPS.map((_,i)=>i));
  sheet.innerHTML = `<div class="choices fadein">
    <div style="font-size:.8rem;color:var(--dim);font-style:italic;">nearest first — furthest last</div>
    ${order.map(i=>`<button class="choice" id="vs${i}" ${i<vIdx?'disabled style="border-color:var(--amethyst);color:var(--amethyst);opacity:.7"':''} onclick="tapVision(${i})">${i<vIdx?'✦ ':''}${VSTEPS[i]}</button>`).join("")}
    <button class="choice ghost" onclick="showPlan()">enough — return ↩</button></div>`;
  layoutTray();
}
function tapVision(i){
  if(i===vIdx){
    vIdx++; S.log.visions=Math.max(S.log.visions, vIdx);
    if(vIdx>=VSTEPS.length){
      earnCharge(1);
      say([
        {who:"tali", t:`"The chain holds. Scarcity was not invented by misers — it was born at 0, and every plan ever made is someone spending the first purse."`},
        {who:"aadi", t:"I recited 'limited resources' in an exam two weeks ago. Tonight I BUILT the limit myself, link by link. It will not come apart again."}
      ], showPlan);
    } else drawVision();
  } else {
    S.log.probeRetries++;
    const b=$("vs"+i); if(b){ b.classList.add("shake"); setTimeout(()=>b.classList.remove("shake"),380); }
  }
}
/* ================= LEVEL ENGINE (AC loop: explore → fail → insight → solve → embody) ================= */
let LV=null, LVv=null, hintIdx=0;
const api = {
  say:(lines,done)=>say(lines,done||levelSheet),
  insight:(k,t,law)=>insight(k,t,law)
};
function enterLevel(id){
  LV = LEVELS[id]; LVv = LV.init(); hintIdx=0; clearInsights();
  S.scene="level";
  setStage(LV.scene(LVv));
  S.actHandler = a => { const act=LV.actions.find(x=>x.id===a); if(act) doAct(act); };
  say(LV.intro, levelSheet);
}
function doAct(act){
  if(LVv._won){ say([{who:"tali", t:`"This one is answered, boy. Now SAY it — or take the hand back to the fields."`}], levelSheet); return; }
  act.run(LVv, api);
  setStage(LV.scene(LVv));
  if(LV.win(LVv) && !LVv._won){ LVv._won=true; }
}
function levelSheet(){
  if(S.scene!=="level") return;
  setStage(LV.scene(LVv));
  const acts = LV.actions.filter(a=>!a.hide || !a.hide(LVv)).map(a=>{
    const done = a.done && a.done(LVv);
    return `<button class="act ${done?'done':''}" onclick="sheetAct('${a.id}')">${done?'✓ ':''}${a.label(LVv)}</button>`;
  }).join("");
  sheet.innerHTML = `<div class="fadein">
    <div class="panel-title"><span class="pt">${LV.title}</span></div>
    <div class="acts">${acts}</div>
    ${LVv._won? `<button class="speakbtn" onclick="startSpeech()">Speak as ${LV.exit(LVv).identity} ▸</button>`
      : `<button class="hintbtn" onclick="askHint()">${hintLabel()}</button>`}
    <div class="btnrow"><button class="gbtn" onclick="leaveLevel()">↩ leave the bench</button></div>
  </div>`;
  layoutTray();
}
function sheetAct(id){ const a=LV.actions.find(x=>x.id===id); if(a) doAct(a); }
function hintLabel(){
  if(hintIdx===0) return "Ask Shyam for a question (free)";
  if(hintIdx>=LV.hints.length) return "No more guidance — everything you need, you have seen";
  return `Ask the world for ${hintIdx===1?"an observation":"a demonstration"} (✧1)`;
}
function askHint(){
  if(hintIdx>=LV.hints.length){ say([{who:"tali", t:`"There is no more guidance, boy. Everything you need, you have already seen."`}], levelSheet); return; }
  const h = LV.hints[hintIdx];
  if(hintIdx>0){ if(!spendCharge()){ say([{who:"tali", t:`"I am cold — no charge to spend. Earn it: solve what the road sets, or go try things with your own hands."`}], levelSheet); return; } }
  hintIdx++; S.log.hints++;
  say(h, levelSheet);
}
function leaveLevel(){
  const warn = LVv._won;
  S.bench=false; clearInsights();
  const back=()=>{ S.scene="plan"; S.actHandler=null; setStage(valleyScene()); showPlan(); };
  if(warn) say([
    {who:"tali", t:`"Walk away now and the trick stays at the bench, boy — a thing that WORKED once is not yet a thing the band can keep doing. Nothing changes until you can SAY it."`}
  ], back);
  else back();
}

/* ---------------- embodiment speech + descent ---------------- */
let SP=null, spIdx=0, spPicks=[], spWrong={};
function startSpeech(){ SP = LV.exit(LVv); spIdx=0; spPicks=[]; spWrong={}; renderBlank(); }
function renderBlank(){
  if(spIdx>=SP.speech.length){ speechDone(); return; }
  const b = SP.speech[spIdx];
  if(!b.opts){ spPicks.push(""); spIdx++; renderBlank(); return; }
  const built = SP.speech.map((seg,i)=>{
    if(!seg.opts) return i<=spIdx? seg.pre : "";
    if(i<spIdx) return `${seg.pre}<span class="blank">${spPicks[i]}</span><span class="dimtag">${seg.dim}</span>`;
    if(i===spIdx) return `${seg.pre}<span class="blank">＿＿＿</span><span class="dimtag">${seg.dim}</span>`;
    return "";
  }).join("");
  const opts = shuffle(b.opts.map((o,i)=>({o,i})));
  sheet.innerHTML = `<div class="ws fadein"><h3>SPEAK AS ${SP.identity.toUpperCase()} — SAY IT AS YOURSELF</h3>
    <div class="sent">${built}</div>
    <div class="wchips">${opts.map(x=>`<button class="wchip" onclick="pickBlank(${x.i})">${x.o.t}</button>`).join("")}</div>
  </div>`;
  layoutTray();
}
function pickBlank(i){
  const b = SP.speech[spIdx], o = b.opts[i];
  if(o.ok){ spPicks.push(o.t); spIdx++; renderBlank(); return; }
  S.log.dims[b.dimKey] = (S.log.dims[b.dimKey]||0)+1;
  S.log.probeRetries++;
  spWrong[spIdx] = (spWrong[spIdx]||0)+1;
  if(spWrong[spIdx]>=2 && SP.descents && SP.descents[b.dimKey]){
    descend(b.dimKey);
  } else {
    say([{who:"world", t:o.counter || b.counter}], renderBlank);
  }
}
function descend(dimKey){
  S.log.descents++;
  const d = SP.descents[dimKey];
  setStage(d.scene());
  S.actHandler=null;
  say([{who:"tali", t:`"Twice cold on the same blank, boy. Then the speech is not the problem — something UNDER it is missing. Come. We go back to where that truth was born."`}]
    .concat(d.lines), ()=>{
    choices(shuffle(d.opts.map(o=>({t:o.t, fn:()=>{
      if(o.ok){
        d.insights.forEach(x=>insight(x.k,x.t,x.law));
        say(d.after.concat([{who:"tali", t:`"THERE it is. Now climb back up — same blank, your own words."`}]), ()=>{
          setStage(LV.scene(LVv)); spWrong[spIdx]=0; renderBlank();
        });
      } else {
        S.log.probeRetries++;
        say([{who:"world", t:d.retry}], ()=>descendQ(d));
      }
    }}))));
  });
}
function descendQ(d){
  choices(shuffle(d.opts.map(o=>({t:o.t, fn:()=>{
    if(o.ok){
      d.insights.forEach(x=>insight(x.k,x.t,x.law));
      say(d.after.concat([{who:"tali", t:`"THERE it is. Now climb back up — same blank, your own words."`}]), ()=>{
        setStage(LV.scene(LVv)); spWrong[spIdx]=0; renderBlank();
      });
    } else { S.log.probeRetries++; say([{who:"world", t:d.retry}], ()=>descendQ(d)); }
  }}))));
}
function speechDone(){
  SP.onPass();
}

          {who:"narr", t:"The talisman warms. Another set of words that are yours because your hands earned them."},
          {who:"tali", t:`"Owned. Nine a hand from this moon on."`}
        ], ()=>{ S.bench=true; clearInsights(); S.scene="plan"; setStage(valleyScene()); showPlan(); });
      }
    };
  }
}
};
/* ================= WINTER — the door is the test ================= */
function winterCommit(){
  say([{who:"shyam", t:`"Last dusk before the snow. You have seen every pile. Commit, one more time — will the store hold?"`}], ()=>{
    choices([
      {t:"It holds — with room to spare.", fn:()=>{ S.winterPred="room"; sceneWinter(); }},
      {t:"It holds — barely, by a few measures.", fn:()=>{ S.winterPred="barely"; sceneWinter(); }},
      {t:"It falls short — winter will collect.", fn:()=>{ S.winterPred="short"; sceneWinter(); }}
    ]);
  });
}
function sceneWinter(){
  S.scene="winter"; S.actHandler=null; clearInsights();
  const v = winterVerdict(S.store);
  setStage(winterScene(v));
  const beats=[{who:"narr", t:"The first snow does not ask if you are ready. It simply arrives, and begins counting."}];
  if(S.winterPred){
    const margin = Math.min(S.store.food-SIM.NEED.food, S.store.fuel-SIM.NEED.fuel, S.store.shelter-SIM.NEED.shelter);
    const actual = !v.pass? "short" : (margin>=12? "room":"barely");
    const names={room:"holds with room", barely:"holds barely", short:"falls short"};
    S.log.predLedger.push({what:"winter", said:S.winterPred, got:actual});
    beats.push({who:"world", t:`THE SNOW: "You said '${names[S.winterPred]}'. The store answers: '${names[actual]}'. ${S.winterPred===actual? "You have learned to read your own valley, boy." : "Mind the gap between the two — that gap is where plans die."}"`});
    S.winterPred=null;
  }
  if(v.pass){
    beats.push({who:"narr", t:`The store holds: <b>${S.store.food}</b> food against the 120 needed. The woodpile: <b>${S.store.fuel}</b> against 40. The roofs: <b>${S.store.shelter}</b> patches, tight as a drum.`});
    beats.push({who:"world", t:`THE ELDER, at midwinter, holding a bowl that is FULL: "Same valley. Same hands. Same days. We have never eaten like this in deep snow. What did you change, boy?"`});
    beats.push({who:"aadi", t: S.rotSolved
      ? "Two things. Where the hands STOOD — every yes paid for with a named no. And one hand that gathered nothing at all… except a new way. The thinking hand fed us more than any picker."
      : "Nothing you had. Only where it STOOD. We stopped asking the valley for more, and started asking every hand: 'what will you NOT do today?'"});
    say(beats, ()=>{ raiseHI(74); whiteStoryGate(); });
  } else {
    const misses=[];
    if(!v.food) misses.push(`food ran out with ${S.store.food} of 120`);
    if(!v.fuel) misses.push(`the woodpile died at ${S.store.fuel} of 40`);
    if(!v.shelter) misses.push(`the roofs stood at ${S.store.shelter} patches of 15`);
    beats.push({who:"narr", t:"The band endures — thinner. "+misses.join("; ")+". No one dies in the First Valley. But spring finds everyone smaller, and the children's eyes older."});
    beats.push(winterTelling(v));
    beats.push({who:"world", t:`THE OLD TREE, over the snow: "Hear the law under your winter, so you carry it out of here: the true price of anything is what you gave up to get it. The hand-moon you spent HERE is the harvest you never saw THERE. Plan with that law, and the store fills."`});
    beats.push({who:"shyam", t:`"Never mind what went wrong. What will you do DIFFERENTLY — not harder, not again: differently?"`});
    beats.push({who:"world", t:`THE ELDER: "The valley forgives. Spring comes; the moons return. Plan again — like you have SEEN winter. Because now you have."`});
    say(beats, ()=>{
      seeLaw("price");
      S.season++; S.log.seasons=S.season; S.moon=1;
      S.store={food:0,fuel:0,shelter:0}; S.exhausted=false; S.bench=false;
      S.alloc={grove:0,roots:0,river:0,forest:0,huts:0};
      setStage(valleyScene()); startPlanning();
    });
  }
}
function winterTelling(v){
  if(S.log.fruitRotTotal>=40) return {who:"world", t:`THE GROVE: "Count what I gave and what you kept: ${S.log.fruitRotTotal} measures blackened across the season. You lost more food to rot than to any shortage of hands. The valley did not fail you — the KEEPING failed you. That is a problem a hand could attack, if a hand were ever spared to think."`};
  if(!v.fuel && S.log.fishRotTotal>0) return {who:"world", t:`THE SMOKEHOUSE: "Two mouths drank one woodpile — the hearth and I. Nobody counted us together, so we both went thirsty. Wood is not one need, boy. It is every need that burns."`};
  if(S.log.pushes>=2) return {who:"world", t:`THE VALLEY: "Twice you spent tomorrow's strength on today's pile, and twice tomorrow came to collect. The season gained nothing. Strength borrowed is not strength created."`};
  return {who:"world", t:`THE VALLEY: "Look at where the hands stood, moon by moon. Enough existed here — it was PLACED wrong. Placement, not effort, is what winter graded."`};
}

/* ================= ERA GATE: WHITESTORY + PROBES + ECHO ================= */
let WSG=null, wsgIdx=0, wsgPicks=[];
function whiteStoryGate(){
  S.scene="whitestory"; S.actHandler=null;
  setStage(valleyScene({extra:`<circle cx="195" cy="200" r="64" fill="#EDE6D6" opacity=".07" class="glow"/>`}));
  say([
    {who:"narr", t:"Spring. The whole band gathers at the old tree. The valley's custom: whoever changes a winter must SAY what they understood — out loud, where the valley can test it."},
    {who:"shyam", t:`"The City is full of recitations, Aadi. Can you build this sentence out of what you DID?"`}
  ], ()=>{
    WSG = {
      blanks:[
        {label:"I want to", opts:[
          {t:"pick every fruit in the valley", ok:false},
          {t:"fill the store before winter", ok:true},
          {t:"work the band ever harder", ok:false}],
         counter:`THE OLD TREE: "You TRIED that. Ask your first winter how it went."`},
        {label:"by", opts:[
          {t:"spreading the hands thin — a little of everything, every moon", ok:false},
          {t:"spending each hand at its best use — and sparing one for new ways", ok:true},
          {t:"gathering only what the valley gives away without asking", ok:false}],
         counter:`THE OLD TREE: "The valley watched where your hands actually stood. Try again."`},
        {label:"so that", opts:[
          {t:"the valley owes the band", ok:false},
          {t:"the band lives to spring", ok:true},
          {t:"no fruit is ever wasted", ok:false}],
         counter:`THE OLD TREE: "The valley keeps no ledgers of debt — yet. Look at the children and try again."`},
        {label:"creating value through", opts:[
          {t:"effort without end, from first light to dusk", ok:false},
          {t:"choosing what to give up — and bettering the ways themselves", ok:true},
          {t:"taking more from the valley, moon after moon", ok:false}],
         counter:`THE OLD TREE: "Effort ran at this wall for a hundred years, boy. What actually moved it?"`}
      ]
    };
    wsgIdx=0; wsgPicks=[]; wsgStep();
  });
}
function wsgStep(){
  if(wsgIdx>=WSG.blanks.length){ probeIntro(); return; }
  const built = WSG.blanks.map((b,i)=> i<wsgIdx? `${b.label} <span class="blank">${wsgPicks[i]}</span>` : (i===wsgIdx? `${b.label} <span class="blank">＿＿＿</span>`:"")).join(" ");
  const b=WSG.blanks[wsgIdx];
  const opts = shuffle(b.opts.map((o,i)=>({o,i})));
  sheet.innerHTML = `<div class="ws fadein"><h3>SAY IT IN YOUR OWN WORDS</h3>
    <div class="sent">${built}</div>
    <div class="wchips">${opts.map(x=>`<button class="wchip" onclick="wsgPick(${x.i})">${x.o.t}</button>`).join("")}</div></div>`;
  layoutTray();
}
function wsgPick(i){
  const b=WSG.blanks[wsgIdx];
  if(b.opts[i].ok){ wsgPicks.push(b.opts[i].t); wsgIdx++; wsgStep(); }
  else { S.log.probeRetries++; say([{who:"world", t:b.counter}], wsgStep); }
}
const PROBES = [
  {who:"THE BOULDER by the path", face:"What", q:`"You said 'give up'. What do you mean by giving up?"`,
   opts:[{t:"Working fewer hours than before, and resting the band more", ok:false},
         {t:"Every hand sent to one place is a hand lost to every other place", ok:true},
         {t:"Throwing away the picked fruit so the baskets stay light", ok:false}]},
  {who:"THE OLD TREE", face:"How", q:`"How do you know that choosing beats sheer effort?"`,
   opts:[{t:"Shyam kept circling it in questions, and he is never wrong", ok:false},
         {t:"Twenty-four hand-moons was all we had; the store filled only when each went to its best use", ok:true},
         {t:"Because fruit tastes sweeter when the hands rest longer", ok:false}]},
  {who:"THE RIVER", face:"Why", q:`"Why must anything be given up at all?"`,
   opts:[{t:"Because the elders demand a sacrifice before every winter", ok:false},
         {t:"Because fruit rots faster than any band could ever eat it", ok:false},
         {t:"Because hands and moons are finite — one path walked abandons the rest", ok:true}]}
];
let probeIdx=0;
function probeIntro(){
  probeIdx=0;
  say([{who:"narr", t:"The sentence stands. And now the place itself leans in. Three voices, three tests — this is how the land decides whether understanding is OWNED or borrowed."}], probeStep);
}
function probeStep(){
  if(probeIdx>=PROBES.length){ talismanEcho(); return; }
  const p=PROBES[probeIdx];
  say([{who:"world", t:`${p.who}: ${p.q}`}], ()=>{
    choices(shuffle(p.opts).map(o=>({t:o.t, fn:()=>{
      if(o.ok){ probeIdx++; probeStep(); }
      else {
        S.log.probeRetries++;
        const key = p.face==="What"?"input":(p.face==="How"?"process":"why");
        S.log.dims[key]++;
        say([{who:"world", t:`${p.who}: "…No. You are reciting again. Stand in what you DID, and answer from there."`}], probeStep);
      }
    }})));
  });
}
function talismanEcho(){
  let tries=0;
  const attempt=()=>{
    say([{who:"tali", t:`"Before the road, boy, I will carry this winter in words — correct me if I carry it wrong: you beat winter because this season the band finally worked HARD enough. Effort filled the store."`}], ()=>{
      choices(shuffle([
        {t:"That is right — the extra effort filled the store. Carry it exactly so.", fn:()=>{
          tries++; S.log.dims.process++;
          say([{who:"shyam", t:`"Did the band work fewer hours in the season that FAILED? …Then what actually changed?"`},
               {who:"tali", t:`"Cold still, boy. Say it again — and say it right."`}], attempt); }},
        {t:"Wrong. The hours never changed — WHERE they stood changed, and every yes was paid with a named no.", fn:()=>{
          if(tries===0) earnCharge(1);
          commitCard(); }},
        {t:"Wrong. The weather was kinder this season — the valley simply gave more.", fn:()=>{
          tries++; S.log.dims.why++;
          say([{who:"world", t:`THE VALLEY: "The sky was the same sky, boy. Ask your own ledger, not my weather."`},
               {who:"tali", t:`"Still cold. Again."`}], attempt); }}
      ]));
    });
  };
  attempt();
}
function commitCard(){
  const inv=[];
  if(S.rotSolved) inv.push(S.rotSolved==="smoke"?"a smokehouse way to keep fruit":"a sun-drying way to keep fruit");
  if(S.roofSolved) inv.push("a reed-woven way to hold a roof");
  S.cards.push({
    name:"Choice — the First Price ★",
    C:"A finite purse: 8 hands × 3 moons = 24, against needs bigger than any single task. Enough existed; it stood in the wrong places — and leaked through old ways no one questioned.",
    I:"The valley's offers — fruit (fast, rots), roots (slow, loyal), fish (rich, charges firewood), wood, roofs"+(inv.length? ", and a spared hand at the bench":"")+".",
    P:"Ranking wants, spending each hand-moon on its best use, paying for every yes with a named no"+(inv.length? " — and trading one hand's gathering for "+inv.join(" and ")+".":"."),
    M:"A winter that held — and the law under it: the true price of anything is what you gave up to get it. Money will not be invented for eras yet. Price already exists."
  });
  ownLaw("price"); raiseHI(90); earnCharge(1); hud(true);
  say([
    {who:"narr", t:"The talisman flares WARM against your chest — properly, for the first time. A card writes itself in the codex out of nothing but what you actually did, and signs itself in your hand."},
    {who:"tali", t:`"Corrected, and warm. Your words now, boy — and that correcting feeling is the whole reason the City exiled you. Keep it."`},
    {who:"world", t:`THE OLD TREE: "Carry it. Everything you meet on this road — every coin, every debt, every price — is this one law wearing better clothes."`}
  ], sceneThreshold);
}
function sceneThreshold(){
  S.scene="threshold"; setStage(mapScene());
  say([
    {who:"tali", t:`"Look at the road through me, boy. Every place you will ever visit now casts a faint shadow-question: at the cost of what? You cannot unsee it. That is what crossing a threshold means."`},
    {who:"narr", t:"On the last night of spring, a small thing refuses to leave you alone. Bodhi the fisher comes back with two baskets. Kesar the hunter — stronger, older, prouder — comes back with half of one. Same day. Same valley. Same hours."},
    {who:"aadi", t:"Same purse spent… DIFFERENT harvest back. So a hand-moon is not a hand-moon? What is hiding inside WORK, Shyam? …Shyam?"},
    {who:"shyam", t:`"<i>the voice is already somewhere ahead, on the eastern path</i> — Does this valley have that answer? Then why are your feet still in it?"`}
  ], journeyLog);
}

/* ================= JOURNEY LOG ================= */
function journeyLog(){
  const d=S.log.dims;
  const soft = Object.keys(d).filter(k=>d[k]>0).map(k=>`${k}: <b>${d[k]}</b>`).join(" · ");
  const kept = S.log.predLedger.filter(x=>x.said===x.got).length;
  const chips = S.log.plans.map(p=>{
    const parts=Object.keys(p.alloc).filter(k=>p.alloc[k]>0).map(k=>`${k}:${p.alloc[k]}`).join(" ");
    return `<span class="ins" style="color:var(--stone);border-color:var(--line)">s${p.season}·m${p.moon} — ${parts}${p.bench?" ·⚒":""}${p.push?" ·pushed":""}</span>`;
  }).join(" ");
  sheet.innerHTML = `<div class="fadein">
    <div class="pt" style="margin-bottom:8px;">JOURNEY LOG · EPISODE 0 — what the game learned about the learner</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;">${chips}</div>
    <div style="font-size:.9rem;color:var(--stone);">seasons: <b>${S.log.seasons}</b> · fruit rotted: <b>${S.log.fruitRotTotal}</b> · pushes: <b>${S.log.pushes}</b> · Shyam asked: <b>${S.log.asks}×</b> (held ${S.log.rungOK} · slipped ${S.log.rungMiss}) · chain built: <b>${S.log.visions}/4</b></div>
    <div style="font-size:.9rem;color:var(--stone);margin-top:5px;">descents: <b>${S.log.descents}</b> · hints: <b>${S.log.hints}</b> · retries: <b>${S.log.probeRetries}</b> · predictions kept: <b>${kept}/${S.log.predLedger.length}</b> · flaws found: <b>${S.log.critFound}</b>, missed: <b>${S.log.critMissed}</b> · laws owned: <b>${Object.keys(S.lawsOwned).length}</b> of ${Object.keys(S.lawsSeen).length} seen</div>
    <div style="font-size:.85rem;color:var(--stone);margin-top:6px;">${soft? "dimensions still soft — "+soft : "every dimension held — context, input, process, why and manifest all answered from lived ground"}</div>
    <div style="font-size:.82rem;color:var(--dim);margin-top:8px;">Every descent was a diagnosis; every failed test, a law half-bought; every extra season, productive failure at work.</div>
    <div class="btnrow">
      <button class="gbtn" onclick="openCodex()">Open the Codex ✦</button>
      <button class="gbtn" onclick="location.reload()">Play again</button>
    </div>
    <div style="font-size:.8rem;color:var(--dim);margin-top:12px;text-align:center;font-style:italic;">…the road continues east — Episode 1, the Netmakers' Water…</div>
  </div>`;
  layoutTray();
}

/* ================= CODEX ================= */
function openCodex(){
  const box=$("cardbox");
  const laws = Object.keys(LAWS).filter(k=>S.lawsSeen[k]).map(k=>
    `<div style="font-size:.88rem;padding:4px 0;color:${S.lawsOwned[k]?'var(--teal)':'var(--dim)'};">${S.lawsOwned[k]?'✦':'◇'} ${LAWS[k]}${S.lawsOwned[k]?'':' <span style="font-size:.72rem;">(half-noticed — prove it, or speak it)</span>'}</div>`).join("");
  box.innerHTML = `<h3>THE CODEX</h3>
    <p style="font-size:.84rem;color:var(--dim);margin-bottom:10px;">It lights only when something is understood. ${S.cards.length} card(s) lit.</p>
    ${laws? `<h3 style="font-size:.85rem;margin:4px 0 6px;">LAWS OF THE ROAD</h3><div style="margin-bottom:12px;">${laws}</div>`:""}
    ${S.cards.map(c=>`
      <div style="border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;">
        <h3 style="font-size:.95rem;margin-bottom:7px;">✦ ${c.name}</h3>
        <div class="cipm-row"><span class="k">C</span><span class="v">${c.C}</span></div>
        <div class="cipm-row"><span class="k">I</span><span class="v">${c.I}</span></div>
        <div class="cipm-row"><span class="k">P</span><span class="v">${c.P}</span></div>
        <div class="cipm-row"><span class="k">M</span><span class="v">${c.M}</span></div>
        <div style="font-size:.75rem;color:var(--dim);margin-top:6px;font-style:italic;text-align:right;">— ${S.name}</div>
      </div>`).join("") || `<p style="color:var(--dim);font-size:.92rem;">Nothing lit yet. Understanding, not answers, fills these pages.</p>`}
    <div style="opacity:.5;font-size:.84rem;color:var(--dim);border-top:1px solid var(--line);padding-top:9px;margin-top:10px;">Episode 1 · LABOR — locked. Opens for those who carry 'Choice — the First Price'. Bodhi's two baskets are waiting to be explained.</div>`;
  $("modal").classList.add("on");
}
</script>
