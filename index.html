<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iTHiNK — the GAME · Episodes 0–1 · v9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --midnight:#0B1024; --indigo:#141B36; --royal:#1E2A55; --line:#2A3560;
    --teal:#1EA896; --gold:#D4AF37; --sienna:#C26A3D; --amethyst:#8E7BC8;
    --parchment:#EDE6D6; --stone:#A7A9B2; --text:#E8E4D8; --dim:#8A90B0;
    --wpyellow:#F6EF7D; --wpwhite:#FFFFFF;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:var(--midnight); color:var(--text); font-family:'EB Garamond',Georgia,serif; font-size:17px; line-height:1.5; display:flex; justify-content:center;}
  #game{width:min(430px,100vw); height:100dvh; display:flex; flex-direction:column; padding:0 10px calc(10px + env(safe-area-inset-bottom)); overflow-y:auto;}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:10px; font-size:1.02rem;}
  .cinzel{font-family:'Cinzel',Georgia,serif;}

  #hud{display:flex; align-items:center; gap:10px; padding:10px 2px 8px; background:var(--midnight); min-height:48px; flex:0 0 auto;}
  .hi-wrap{flex:1; min-width:120px;}
  .hi-label{display:flex; justify-content:space-between; font-size:.62rem; letter-spacing:1.5px; color:var(--dim); margin-bottom:3px; text-transform:uppercase; font-family:'Cinzel',serif;}
  .hi-track{height:11px; background:#0d1230; border:1px solid var(--line); border-radius:99px; position:relative; overflow:hidden;}
  .hi-cur{position:absolute; top:0; bottom:0; left:0; background:linear-gradient(90deg,var(--sienna),var(--gold)); border-radius:99px; transition:width 1.4s ease;}
  .hi-pot{position:absolute; top:-1px; bottom:-1px; border:1.5px dashed var(--teal); border-left:none; border-radius:0 99px 99px 0;}
  .codex-chip{background:var(--indigo); border:1px solid var(--amethyst); color:var(--amethyst); border-radius:99px; padding:7px 13px; font-size:.76rem; font-family:'Cinzel',serif; letter-spacing:1px;}

  #stage{flex:1 1 auto; min-height:210px; position:relative; background:#0B1024; border:1px solid var(--line); border-radius:14px; overflow:hidden;}
  #stage svg{position:absolute; inset:0; width:100%; height:100%;}

  #dlg{margin-top:8px; flex:0 0 auto;}
  .dline{background:var(--indigo); border:1px solid var(--line); border-radius:12px; padding:12px 14px; cursor:pointer;}
  .dline .who{display:inline-block; font-size:.6rem; font-weight:700; letter-spacing:1.5px; padding:3px 10px; border-radius:99px; margin-bottom:6px; font-family:'Cinzel',serif;}
  .who.aadi{background:rgba(212,175,55,.14); color:var(--gold);}
  .who.shyam{background:rgba(142,123,200,.16); color:var(--amethyst);}
  .who.narr{background:rgba(167,169,178,.12); color:var(--stone);}
  .who.tali{background:rgba(237,230,214,.12); color:var(--parchment);}
  .who.world{background:rgba(30,168,150,.14); color:var(--teal);}
  .dline .txt{display:block; font-size:1.04rem;}
  .dline .adv{float:right; color:var(--dim); font-size:1.05rem; margin-top:-4px;}
  .choices{display:flex; flex-direction:column; gap:8px; margin-top:8px;}
  .choice{background:var(--royal); border:1px solid var(--line); color:var(--text); padding:13px 15px; border-radius:11px; text-align:left; font-size:1rem; min-height:48px;}
  .choice:active{border-color:var(--gold);}
  .choice:disabled{opacity:.35;}
  .backbtn{background:transparent; border:1px solid var(--line); color:var(--dim); border-radius:99px; width:36px; height:36px; font-size:1rem; float:left; margin-right:9px; line-height:1;}

  #clues{display:none; margin-top:7px; gap:5px; flex-wrap:wrap; flex:0 0 auto;}
  #clues.on{display:flex;}
  .clue{font-size:.74rem; color:var(--teal); border:1px dashed rgba(30,168,150,.55); border-radius:99px; padding:4px 11px; animation:pop .4s;}
  @keyframes pop{0%{transform:scale(.6); opacity:0;}100%{transform:scale(1); opacity:1;}}

  #store{display:none; margin-top:8px; background:var(--indigo); border:1px solid var(--line); border-radius:12px; padding:10px 13px; flex:0 0 auto;}
  .st-row{display:flex; align-items:center; gap:9px; margin:5px 0;}
  .st-name{flex:0 0 76px; font-size:.66rem; letter-spacing:1px; text-transform:uppercase; color:var(--dim); font-family:'Cinzel',serif;}
  .st-track{flex:1; height:9px; background:#0d1230; border:1px solid var(--line); border-radius:99px; position:relative; overflow:hidden;}
  .st-fill{position:absolute; top:0; bottom:0; left:0; background:var(--teal); border-radius:99px; transition:width .9s ease;}
  .st-num{flex:0 0 76px; text-align:right; font-size:.85rem; color:var(--stone);}

  #plan,#crew{display:none; margin-top:8px; background:var(--indigo); border:1px solid var(--line); border-radius:12px; padding:11px 13px; flex:0 0 auto;}
  .plan-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; flex-wrap:wrap; gap:4px;}
  .plan-title{font-size:.66rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); font-family:'Cinzel',serif;}
  .hands-left{font-size:.86rem; color:var(--stone);}
  .site{display:flex; align-items:center; gap:8px; padding:8px 0; border-top:1px solid rgba(42,53,96,.6);}
  .site-name{flex:1; cursor:pointer; line-height:1.3;}
  .site-name .nm{color:var(--text); font-size:.98rem;}
  .site-name .yl{display:block; font-size:.78rem; color:var(--dim); font-style:italic;}
  .ctr{display:flex; align-items:center; gap:7px;}
  .ctr button{width:42px; height:42px; border-radius:10px; background:var(--royal); color:var(--text); border:1px solid var(--line); font-size:1.25rem; line-height:1;}
  .ctr button:disabled{opacity:.3;}
  .ctr .n{width:22px; text-align:center; font-size:1.1rem; color:var(--gold);}
  .taskbtn{min-width:104px; background:var(--royal); border:1px solid var(--line); color:var(--gold); padding:11px 10px; border-radius:10px; font-size:.9rem; min-height:44px;}
  .plan-foot{display:flex; align-items:center; gap:10px; margin-top:9px; flex-wrap:wrap;}
  .pushbox{display:flex; align-items:center; gap:6px; font-size:.85rem; color:var(--stone); cursor:pointer;}
  .gobtn{background:var(--sienna); color:#1a0e04; font-weight:700; padding:13px 20px; margin-left:auto; font-family:'Cinzel',serif; letter-spacing:1px; font-size:.86rem; min-height:48px;}
  .gobtn:disabled{opacity:.35;}

  .btnrow{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; flex:0 0 auto;}
  .ghostbtn{background:transparent; border:1px solid var(--line); color:var(--stone); padding:11px 15px; font-size:.85rem; border-radius:99px; min-height:44px;}
  .shyambtn{background:transparent; border:1px solid rgba(142,123,200,.5); color:var(--amethyst); padding:11px 15px; font-size:.85rem; border-radius:99px; display:none; min-height:44px;}

  .ws{background:var(--parchment); color:#2b2416; border-radius:14px; padding:17px 16px; margin-top:8px; font-size:1.02rem;}
  .ws h3{color:#5a4a1e; letter-spacing:1px; margin-bottom:9px; font-size:.9rem; font-family:'Cinzel',serif;}
  .ws .blank{display:inline-block; min-width:90px; border-bottom:2px solid #8a7a4a; color:#8a2f14; font-weight:600; text-align:center; padding:0 4px;}
  .ws .wchoices{display:flex; flex-direction:column; gap:7px; margin-top:11px;}
  .ws .wchoice{background:#e0d6bf; border:1px solid #b3a67f; color:#2b2416; padding:12px 13px; border-radius:8px; text-align:left; font-size:.96rem; min-height:46px;}

  /* v9: chain (learner-built vision) */
  .chainrow{display:flex; flex-direction:column; gap:7px; margin-top:8px;}
  .chainbtn{background:var(--royal); border:1px solid var(--line); color:var(--text); padding:12px 14px; border-radius:11px; text-align:left; font-size:.96rem; min-height:46px;}
  .chainbtn.done{background:rgba(142,123,200,.14); border-color:var(--amethyst); color:var(--amethyst); pointer-events:none;}
  .chainbtn.shake{animation:shake .35s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

  #login{position:fixed; inset:0; z-index:50; background:var(--wpyellow); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px;}
  .wp-page{position:relative; background:var(--wpwhite); width:min(300px,80vw); border-radius:6px; padding:38px 28px 30px; box-shadow:0 18px 50px rgba(90,80,10,.18);}
  .wp-smile{position:absolute; right:-2px; top:38%;}
  .wp-sub{font-size:.78rem; letter-spacing:2px; color:#9a9260; text-align:center; margin-bottom:26px; font-family:'Cinzel',serif;}
  .wp-field{width:100%; border:none; border-bottom:2px solid #e6df9a; background:transparent; padding:10px 2px; font-family:'EB Garamond',serif; font-size:1.08rem; color:#3a3418; outline:none; margin-bottom:22px;}
  .wp-field::placeholder{color:#c2bb85;}
  .wp-btn{width:100%; background:#3a3418; color:var(--wpyellow); padding:14px; border-radius:8px; font-family:'Cinzel',serif; letter-spacing:2px; font-size:.86rem; min-height:48px;}
  .wp-foot{margin-top:26px; font-size:.7rem; letter-spacing:2px; color:#8a8250; font-family:'Cinzel',serif;}

  #modal{display:none; position:fixed; inset:0; background:rgba(4,6,16,.88); z-index:40; justify-content:center; align-items:center; padding:14px;}
  #modal.on{display:flex;}
  .card{background:var(--indigo); border:1px solid var(--amethyst); border-radius:16px; max-width:430px; width:100%; padding:18px; max-height:84vh; overflow:auto;}
  .card h3{color:var(--amethyst); margin-bottom:6px; letter-spacing:1px; font-family:'Cinzel',serif;}
  .cipm-row{display:flex; gap:9px; margin:7px 0; font-size:.92rem;}
  .cipm-row .k{flex:0 0 28px; height:28px; border-radius:8px; background:var(--royal); border:1px solid var(--amethyst); color:var(--amethyst); font-weight:800; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif;}
  .cipm-row .v{color:var(--stone); padding-top:3px;}
  .lockedcard{opacity:.5; font-size:.84rem; color:var(--dim); border-top:1px solid var(--line); padding-top:9px; margin-top:10px;}

  .tw{animation:twinkle 2.6s ease-in-out infinite;}
  .tw2{animation:twinkle 3.4s ease-in-out infinite 1.2s;}
  @keyframes twinkle{0%,100%{opacity:1;}50%{opacity:.2;}}
  .flame{transform-origin:center bottom; animation:flick .9s ease-in-out infinite;}
  @keyframes flick{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.15) scaleX(.96);}}
  .glow{animation:glowp 1.8s ease-in-out infinite;}
  @keyframes glowp{0%,100%{opacity:.25;}50%{opacity:.6;}}
  .fadein{animation:fadein .8s ease;}
  @keyframes fadein{from{opacity:0;}to{opacity:1;}}
  .snow line{stroke:#cdd6f5; stroke-width:1; opacity:.5;}
  .snow{animation:snowfall 1.4s linear infinite;}
  @keyframes snowfall{0%{transform:translateY(-12px);}100%{transform:translateY(0);}}
  .ripple{animation:rippleflow 4s ease-in-out infinite;}
  @keyframes rippleflow{0%,100%{transform:translateX(0);}50%{transform:translateX(6px);}}
  .pagecameo{animation:pagecameo 22s ease forwards;}
  @keyframes pagecameo{
    0%{opacity:0; transform:translateX(-24px);}
    10%{opacity:.3; transform:translateX(0);}
    80%{opacity:.3; transform:translateX(0);}
    100%{opacity:0; transform:translateX(14px);}
  }
</style>
</head>
<body>
<div id="login">
  <div class="wp-page">
    <svg class="wp-smile" width="26" height="46" viewBox="0 0 26 46">
      <path d="M2,4 Q22,23 2,42" stroke="var(--wpyellow)" stroke-width="5" fill="none" stroke-linecap="round"/>
    </svg>
    <div style="display:flex; justify-content:center; margin-bottom:8px;">
      <svg width="190" height="68" viewBox="0 0 200 70" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="0" width="10" height="10" fill="#E5D64A"/>
        <g stroke="#E5D64A" stroke-width="10" stroke-linecap="butt">
          <line x1="7" y1="16" x2="7" y2="66"/>
          <line x1="2" y1="61" x2="94" y2="61"/>
        </g>
        <g stroke="#A6A6AC" stroke-width="10" stroke-linecap="butt" fill="none">
          <line x1="19" y1="15" x2="55" y2="15"/><line x1="37" y1="15" x2="37" y2="52"/>
          <line x1="65" y1="10" x2="65" y2="52"/><line x1="87" y1="10" x2="87" y2="52"/><line x1="65" y1="31" x2="87" y2="31"/>
          <line x1="105" y1="10" x2="105" y2="36"/>
          <line x1="123" y1="52" x2="123" y2="10"/><line x1="123" y1="10" x2="147" y2="52"/><line x1="147" y1="52" x2="147" y2="10"/>
          <line x1="165" y1="10" x2="165" y2="52"/><line x1="193" y1="10" x2="167" y2="33"/><line x1="171" y1="29" x2="195" y2="52"/>
        </g>
        <rect x="100" y="44" width="10" height="9" fill="#A6A6AC"/>

    </div>
    <div class="wp-sub">THE GAME</div>

</div>
<div id="game">
  <div id="hud" style="visibility:hidden;">
    <div class="hi-wrap">
      <div class="hi-label"><span id="hiname">—</span><span><span id="hival">0</span>/<span id="hipot">0</span></span></div>
      <div class="hi-track"><div class="hi-cur" id="hicur" style="width:0%"></div><div class="hi-pot" id="hipotmark" style="left:0%; right:5%;"></div></div>

    <button class="codex-chip" onclick="openCodex()">Codex ✦ <span id="codexn">0</span></button>

    <div class="st-row"><span class="st-name">Firewood</span><div class="st-track"><div class="st-fill" id="sf_fuel"></div></div><span class="st-num" id="sn_fuel">0 / ?</span></div>

    <div class="plan-head">

<script id="sim">
/* ---- pure simulation: no DOM ---- */
const SIM = {
  HANDS: 8, MOONS: 3,
  NEED: { food: 100, fuel: 40, shelter: 15 },
  SITES: {
    grove:  { label:"the fruit grove",     unit:"food",    per:12 },
    roots:  { label:"the root field",      unit:"food",    per:8,  keep:1 },
    river:  { label:"the river",           unit:"food",    per:10, keep:1, smokeFuel:2 },
    forest: { label:"the deadwood forest", unit:"fuel",    per:8 },
    huts:   { label:"the huts",            unit:"shelter" },
    shop:   { label:"the workshop",        unit:"none",    per:0 }
  }
};
/* tech = what the band has learned to do differently. Starts poor. */
function freshTech(){ return { fruitKeep:0.3, fruitFuelFlat:0, hutPer:6, tried:{} }; }
function computeMoon(alloc, push, exhausted, fuelStore, tech){
  const m = (push?1.3:1) * (exhausted?0.6:1);
  const a = k => alloc[k]||0;
  const out = { mult:m, fruitGathered:0, fruitKept:0, fruitRot:0,
                fishRaw:0, fishKept:0, fishRot:0, smokeUsed:0,
                roots:0, wood:0, hutwork:0, gained:{food:0,fuel:0,shelter:0} };
  out.fruitGathered = Math.round(a("grove")*SIM.SITES.grove.per*m);
  out.roots = Math.round(a("roots")*SIM.SITES.roots.per*m);
  out.wood  = Math.round(a("forest")*SIM.SITES.forest.per*m);
  out.hutwork = Math.round(a("huts")*tech.hutPer*m);
  out.fishRaw = Math.round(a("river")*SIM.SITES.river.per*m);
  let avail = fuelStore + out.wood;
  if(a("river")){
    const cost = SIM.SITES.river.smokeFuel * a("river");
    if(avail >= cost){ out.fishKept = out.fishRaw; out.smokeUsed = cost; }
    else { const hands = Math.floor(avail/SIM.SITES.river.smokeFuel);
           out.fishKept = Math.round(out.fishRaw*hands/a("river"));
           out.smokeUsed = hands*SIM.SITES.river.smokeFuel;
           out.fishRot = out.fishRaw - out.fishKept; }
    avail -= out.smokeUsed;
  }
  let keep = tech.fruitKeep;
  if(a("grove") && tech.fruitFuelFlat>0){
    if(avail >= tech.fruitFuelFlat){ out.smokeUsed += tech.fruitFuelFlat; avail -= tech.fruitFuelFlat; }
    else { keep = 0.3; } /* no wood for the fruit-smoke: falls back to raw storage */
  }
  out.fruitKept = Math.round(out.fruitGathered*keep);
  out.fruitRot = out.fruitGathered - out.fruitKept;
  out.gained.food = out.roots + out.fishKept + out.fruitKept;
  out.gained.fuel = out.wood - out.smokeUsed;
  out.gained.shelter = out.hutwork;
  return out;
}
function winterVerdict(store){
  return { food: store.food >= SIM.NEED.food,
           fuel: store.fuel >= SIM.NEED.fuel,
           shelter: store.shelter >= SIM.NEED.shelter,
           pass: store.food>=SIM.NEED.food && store.fuel>=SIM.NEED.fuel && store.shelter>=SIM.NEED.shelter };
}
/* ---- the workshop: attempts change tech. Each is try-once. ---- */
const WORKSHOP = {
  problems: {
    rot: { label:"the fruit that blackens", need:"fruitRotSeen",
      methods: {
        sun:   { label:"spread the fruit thin under the sun — the way the roots dry", ok:true,
                 apply:t=>{t.fruitKeep=0.7; t.fruitFuelFlat=0;},
                 tell:"THE GROVE: \"…So the sun takes the water and leaves the sweetness. Seven of ten now survive to winter. You did not grow one more fruit, boy — you stopped LOSING them. Remember which of those was free.\"" },
        smoke: { label:"hang the fruit in the smokehouse beside the fish", ok:true,
                 apply:t=>{t.fruitKeep=0.9; t.fruitFuelFlat=2;},
                 tell:"THE SMOKEHOUSE: \"Nine of ten will keep — but I drink two measures of wood each moon for it. Every improvement has a price. Yours is now a standing bill.\"" },
        river: { label:"sink the fruit baskets in the cold river", ok:false,
                 apply:t=>{t.fruitKeep=0.5;},
                 tell:"THE RIVER: \"Cold slows the rot. It does not stop it. Half will still blacken — better than before, worse than you hoped. Now you know what cold is and is not.\"" },
        bury:  { label:"bury the fruit in the cool earth, like roots", ok:false,
                 apply:t=>{},
                 tell:"THE ROOT FIELD: \"The root LIVES in the earth — the fruit only dies there faster. Damp is rot's mother. A failed test that teaches is not a wasted hand, boy. But it was still a hand.\"" }
      }},
    roofs: { label:"the roofs that leak", need:null,
      methods: {
        reeds: { label:"weave river reeds into the thatch, tight as a net", ok:true,
                 apply:t=>{t.hutPer=9;},
                 tell:"THE OLD HUT: \"Reed over straw, crossed like netting — the wind slides off instead of in. Nine patches a moon per hand now, where six went before. Same hands. Better idea.\"" },
        ash:   { label:"pack hearth ash into the gaps", ok:false,
                 apply:t=>{},
                 tell:"THE OLD HUT: \"Dry, the ash sat. Wet, it ran like grey soup down my walls. The field drinks ash; walls do not. Wrong place for a right thing.\"" }
      }}
  }
};
/* ---- era II: labor ---- */
const SIM2 = {
  DAYS:3, TARGET:380, QSTART:0.75,
  WORKERS:{
    meen:{name:"Meen", gift:"sharp eyes — she calls the shoals before they break", apt:{spot:2.0,net:1.0,mend:0.8,smoke:0.8}},
    karn:{name:"Karn", gift:"a strong back — hauls wood like straw, but his net comes up torn", apt:{spot:0.7,net:1.0,mend:0.6,smoke:1.5}},
    dhara:{name:"Dhara", gift:"steady hands — her pull is slow and never slips", apt:{spot:0.8,net:1.6,mend:1.2,smoke:0.9}},

    puna:{name:"Old Puna", gift:"sixty years of water — sits, watches, points, and is always right", apt:{spot:1.8,net:0.9,mend:1.0,smoke:1.2}}
  },
  TASKS:["spot","net","mend","smoke"],
  TASKNAMES:{spot:"spotting shoals", net:"the nets", mend:"mending", smoke:"the racks"}
};
function computeDay(assign, streaks, quality){
  const pts = {spot:0,net:0,mend:0,smoke:0};
  for(const w in assign){
    const t = assign[w]; if(!t) continue;
    const mult = 1 + 0.25*Math.min(streaks[w]||0, 2);
    pts[t] += SIM2.WORKERS[w].apt[t]*mult;
  }
  const netted = Math.round(55 * pts.net * (1 + 0.2*pts.spot) * quality);
  const cap = Math.round(100 * pts.smoke);
  const stored = Math.min(netted, cap);
  const wasted = netted - stored;
  const nextQ = Math.max(0.55, Math.min(1, quality - 0.15 + 0.15*pts.mend));
  return {pts, netted, cap, stored, wasted, nextQ};
}

/* ---------------- era 0 planning ---------------- */
function startPlanning(){

function shopOpen(){ return S.moon>1 || S.season>1; }
function showPlan(){
  $("plan").style.display="block";
  $("moontitle").textContent = ["First Moon","Second Moon","Last Moon"][S.moon-1] + (S.season>1? " · season "+S.season : "") + (S.exhausted?" · the band is weary":"");
  if(S.moon===2 && S.season===1 && !S.cameoShown){ S.cameoShown=true; stage.innerHTML = valleySVG(pageCameo()); }
  renderSites(); updateHands();

}
function renderSites(){
  $("sites").innerHTML = Object.keys(SIM.SITES).map(k=>{
    if(k==="shop" && !shopOpen()) return "";
    const seen = k==="shop" ? true : S.examined[k];
    const yl = k==="shop" ? "one hand, one experiment — a new way costs a hand now, pays every moon after"
             : (seen ? yieldText(k) : "walk closer to learn what it offers");
    return `<div class="site">
      <div class="site-name" onclick="siteTouch('${k}')"><span class="nm">${cap(SIM.SITES[k].label)}</span><span class="yl">${yl}</span></div>

      </div></div>`;
  }).join("");
}
function yieldText(k){
  if(k==="grove"){
    if(S.tech.fruitKeep>=0.9) return "12 food/hand — smoked: 9 of 10 keep, drinks 2 wood/moon";
    if(S.tech.fruitKeep>=0.7) return "12 food/hand — sun-dried: 7 of 10 now keep";
    if(S.tech.fruitKeep>=0.5) return "12 food/hand — river-chilled: half still rot";
    return "12 food/hand — 7 of 10 rot, the old way";
  }
  if(k==="river") return "10 food/hand — smoking eats 2 firewood per hand";
  if(k==="huts") return (S.tech.hutPer>6? S.tech.hutPer+" patches/hand — reed-woven, the new way" : "6 patches/hand, the old way");
  const s=SIM.SITES[k];
  return s.per+" "+(s.unit==="shelter"?"patches":s.unit)+"/hand"+(k==="roots"?" — stores well":"");
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function siteTouch(k){
  if(k==="shop") return;
  if(!S.examined[k]){
    S.examined[k]=true;
    const t = k==="grove" ? "THE GROVE: \"A hand picks twelve a moon — and seven of ten rot before deep winter, the old way. I did warn you.\"" : TELL[k].t;

function handsUsed(){ return Object.values(S.alloc).reduce((a,b)=>a+b,0); }
function updateHands(){

  wirePush();
}
function inc(k){ if(handsUsed()<SIM.HANDS && !(k==="shop"&&S.alloc.shop>=1)){ S.alloc[k]=(S.alloc[k]||0)+1; updateHands(); } }
function dec(k){ if(S.alloc[k]>0){ S.alloc[k]--; updateHands(); } }

/* ---- v9: pushing harder demands a prediction first ---- */
function wirePush(){
  const c = $("pushchk");
  c.onchange = null;
  c.onchange = ()=>{
    if(c.checked && !S.pushAsked){
      c.checked = false;
      say([
        {who:"shyam", t:`"Before you spend strength you have not counted — where will the EXTRA come from? Name your answer, and we will hold it against what happens."`}
      ], ()=>{
        choices([
          {t:"Nowhere it costs — effort is free if the will is strong.", fn:()=>setPushPred("free")},
          {t:"The valley will simply give more to those who ask harder.", fn:()=>setPushPred("valley")},
          {t:"From next moon — we would be borrowing the band's strength from tomorrow.", fn:()=>setPushPred("borrow")}
        ]);
      });
    }
  };
}
function setPushPred(p){
  S.pushAsked = true; S.pushPrediction = p;
  S.log.predictions.push({what:"push", said:p});
  const line = p==="borrow"
    ? {who:"shyam", t:`"Borrowed. So you already suspect there is a ledger. Check it — the box is yours to tick."`}
    : {who:"shyam", t:`"So that is your claim. The moon after will grade it. Tick the box if you still want to."`};
  say([line], ()=>{ showPlan(); $("pushchk").checked = true; });
}

function runMoon(){
  const push = $("pushchk").checked;
  if(S.alloc.shop>0 && !S.expPending){ chooseExperiment(); return; }
  const alloc = {...S.alloc};
  const res = computeMoon(alloc, push, S.exhausted, S.store.fuel, S.tech);
  S.log.plans.push({season:S.season, moon:S.moon, alloc, push, exhausted:S.exhausted});
  if(push) S.log.pushes++;
  const wasExhausted = S.exhausted;
  S.exhausted = push;
  S.store.food += res.gained.food;
  S.store.fuel += res.gained.fuel;
  S.store.shelter += res.gained.shelter;
  S.log.fruitRotTotal += res.fruitRot; S.log.fishRotTotal += res.fishRot;
  if(res.fruitRot>0) S.fruitRotSeen = true;
  $("plan").style.display="none"; $("pushchk").checked=false;
  drawStore();
  const beats = [];
  if(wasExhausted){
    beats.push({who:"narr", t:"The band moves like wet rope this moon — last moon's pushing is being repaid, with interest."});
    const pred = S.pushPrediction;
    if(pred==="borrow") beats.push({who:"world", t:`THE VALLEY, in the dragging of feet: "You named it before you spent it — BORROWED. Here is the collection. Strength is a store like any other: what you draw beyond its filling, you owe."`});
    else if(pred) beats.push({who:"world", t:`THE VALLEY, in the dragging of feet: "You said ${pred==="free"?"effort was free":"I would simply give more"}. Look at the band. The extra came from THIS moon — pushing does not create strength, it moves it. Everything is drawn from a store."`});
  }
  if(S.expPending) runExperiment(beats);
  if(alloc.grove) beats.push({who:"narr", t:`The grove: ${res.fruitGathered} measures picked${res.fruitRot?` — and by moon's end, ${res.fruitRot} lie blackened in the baskets. ${res.fruitKept} survive`:` — ${res.fruitKept} kept`}.`});
  if(alloc.roots) beats.push({who:"narr", t:`The root field: ${res.roots} measures dug, dried, stored. They will not betray you.`});
  if(alloc.river) beats.push({who:"narr", t:`The river: ${res.fishRaw} measures netted. ${res.fishKept} smoked and saved${res.smokeUsed?` (the smokehouse ate ${res.smokeUsed} firewood)`:""}${res.fishRot?`; ${res.fishRot} ROT unsmoked — the wood ran out`:""}.`});
  if(alloc.forest) beats.push({who:"narr", t:`The forest: ${res.wood} measures of firewood hauled.`});
  if(alloc.huts) beats.push({who:"narr", t:`The huts: ${res.hutwork} patches set against the wind.`});
  if(push) beats.push({who:"narr", t:"The band worked past dusk every day. It shows in the piles — and in their faces. Something was borrowed this moon."});
  say(beats, ()=>{ S.rung=0; S.expPending=null; afterMoon(alloc, res, push); });
}

/* ---- v9: THE WORKSHOP — invent before being taught ---- */
function chooseExperiment(){
  const probs = [];
  if(S.fruitRotSeen && !allTried("rot")) probs.push("rot");
  if(!allTried("roofs")) probs.push("roofs");
  if(!probs.length){
    say([{who:"world", t:"THE WORKSHOP, dusty: \"Nothing here is asking a question today. Bring me a problem you have SEEN, and a hunch.\""}],
      ()=>{ S.alloc.shop=0; showPlan(); });
    return;
  }
  say([
    {who:"narr", t:"One hand stands free of the fields this moon, before a bench of borrowed tools. The valley's problems queue up like patients."},
    {who:"shyam", t:`"A hand that makes nothing this moon. What must it make instead, to be worth its keep?"`}
  ], ()=>{
    choices(probs.map(p=>({t:"Attack "+WORKSHOP.problems[p].label, fn:()=>chooseMethod(p)})));
  });
}
function allTried(p){
  const t = S.tech.tried[p]||{};
  return Object.keys(WORKSHOP.problems[p].methods).every(m=>t[m]);
}
function chooseMethod(p){
  const P = WORKSHOP.problems[p];
  const tried = S.tech.tried[p]||{};
  say([{who:"world", t: p==="rot"
    ? "THE WORKSHOP: \"The fruit blackens. You have SEEN this valley work: roots dry hard in the sun and live. Fish keeps in smoke. The river runs cold. The earth is cool and dark. Which of the valley's own tricks will you steal for the fruit? Your hunch, boy — not a recitation.\""
    : "THE WORKSHOP: \"The roofs leak. You have seen reeds woven into nets that hold thrashing fish, and ash keep the field soft. What will you try against the wind?\""}],
  ()=>{
    choices(Object.keys(P.methods).map(m=>({
      t: P.methods[m].label + (tried[m]? "  (tried)":""), off: !!tried[m],
      fn: ()=>{ S.expPending = {p, m}; runMoon(); }
    })));
  });
}
function runExperiment(beats){
  const {p, m} = S.expPending;
  const M = WORKSHOP.problems[p].methods[m];
  (S.tech.tried[p] = S.tech.tried[p]||{})[m] = true;
  M.apply(S.tech);
  S.log.inventions.push({season:S.season, moon:S.moon, problem:p, method:m, worked:M.ok});
  beats.push({who:"narr", t:"At the workshop, the experiment runs its course — the moon itself is the test bench."});
  beats.push({who:"world", t:M.tell});
  if(M.ok) beats.push({who:"aadi", t:"It WORKED. Same valley, same hands — and the numbers just moved. In the City they never told me you could argue with a number and win."});
  else beats.push({who:"aadi", t:"…It failed. But I know exactly WHY it failed, which is strange — failing in the City taught me nothing but shame. Next hunch will be better aimed."});
}

function paceShort(){
  const frac = S.moon/SIM.MOONS;
  return ["food","fuel","shelter"].filter(k=> S.store[k] < SIM.NEED[k]*frac);
}
function afterMoon(alloc, res, push){
  const short = paceShort();
  const onPace = short.length===0;
  if(onPace) raiseHI(42 + S.moon*4);
  const lines = [];
  if(onPace){
    lines.push({who:"aadi", t: S.moon<3 ? "Look at the store. LOOK at it. In the City I never once saw a number I'd carried myself…" : "The store is fat and the roofs are tight. Now we find out what winter thinks of our arithmetic."});
  } else {
    lines.push({who:"narr", t:`(At this pace, ${short.join(" and ")} will fall short of winter's mark.)`});
    lines.push(shyamAfterMoon(alloc, res, push));
  }
  say(lines, ()=>{
    if(S.moon < SIM.MOONS){ S.moon++; S.alloc={grove:0,roots:0,river:0,forest:0,huts:0,shop:0}; showPlan(); }
    else sceneWinter();
  });
}
function shyamAfterMoon(alloc, res, push){
  if(res.fruitRot >= 25) return {who:"shyam", t:`"The grove paid you ${res.fruitGathered} and your baskets kept ${res.fruitKept}. Who ate the difference? And is picking MORE the only answer — or is there a hand that could stop the eating itself?"`};
  if(res.fishRot > 0) return {who:"shyam", t:`"The river gave ${res.fishRaw} and the smokehouse saved ${res.fishKept}. What does smoke cost — and who forgot to pay it?"`};
  if(push) return {who:"shyam", t:`"Bigger piles today. Where did this moon's extra strength come from? Was it free?"`};
  const spread = Object.values(alloc).filter(v=>v>0).length>=4 && Math.max(...Object.values(alloc))<=2;
  if(spread) return {who:"shyam", t:`"Eight hands in ${Object.values(alloc).filter(v=>v>0).length} places — is a fistful of everything a store of anything?"`};
  return {who:"shyam", t:`"What will you STOP doing next moon? And what has no hand tried YET? Adding is not the only move — and neither is moving."`};
}
/* ---------------- Shyam's cascade — era-aware, questions only ---------------- */
function ladder(){
  if(S.era===0){
    const last = S.log.plans[S.log.plans.length-1];
    const topTask = last ? Object.keys(last.alloc).reduce((a,b)=> last.alloc[a]>=last.alloc[b]?a:b) : null;
    return [
      last && last.alloc[topTask]>0
        ? `"Last moon you gave ${SIM.SITES[topTask].label} ${last.alloc[topTask]} hands. While they stood THERE — what did the valley not get? Can you name it?"`
        : `"Before you choose — whatever you pick, can you name what you are NOT picking?"`,
      `"One hand. One moon. One place. Can it be in two? Then what happens to the choice you did not make — does it wait for you?"`,
      `"Count with me, slowly. Eight hands, three moons — how big is the purse? And what must it buy, all of it, before the snow?"`,
      `"On the road here we came to a fork, and you took the left path. Where did the right one go? What would you call a thing that stops existing the moment you choose?"`
    ];
  }
  const bad = worstFit();
  return [
    bad ? `"You set ${bad.name} to ${SIM2.TASKNAMES[bad.task]}. What is ${bad.name}'s hand actually FOR? Have you watched it?"`
        : `"Before you set the day — can you say what each hand is FOR, not just where it stands?"`,
    `"Two hands, same hour, different baskets — if the hours are equal, what is unequal?"`,
    `"What grows in a hand that repeats one craft? Can you buy it at any market? Can you lend it to a neighbor?"`,
    `"The first time you tied a knot, how long did it take? And the hundredth time? What changed — the rope, or you?"`
  ];
}
function worstFit(){
  let worst=null;
  for(const w in S.assign){
    const t=S.assign[w]; if(!t) continue;
    const apt=SIM2.WORKERS[w].apt[t];
    if(apt<1.0 && (!worst || apt<worst.apt)) worst={name:SIM2.WORKERS[w].name, task:t, apt};
  }
  return worst;
}
function askShyam(){
  S.log.asks++;
  const L = ladder();
  const r = Math.min(S.rung, L.length-1);
  S.log.deepestRung = Math.max(S.log.deepestRung, r+1);
  const lines = [{who:"shyam", t:L[r]}];
  if(r===L.length-1) lines.push({who:"world", t: S.era===0
    ? `THE WIND, through the grass, almost a word: "…the price… the price…"`
    : `THE WIND, off the water, almost a word: "…the hand… the hand…"`});
  say(lines, ()=>{ restorePanels(); });
  S.rung = (r+1) % L.length;
}
function restorePanels(){
  if(S.scene==="plan") showPlan();
  if(S.scene==="crew") showCrew();
}

/* ==========================================================================
   VISIONS v9 — the player BUILDS the chain back to 0, link by link
   ========================================================================== */
const VCHAIN = {
  0:{ steps:[
      "This valley — one green bowl in a ring of rock; count its trees, you would finish counting",
      "The earth — one ball of rock and water, lit on one side; it has never once grown",
      "The sun — a purse of fire, spending itself thinner with every heartbeat",
      "0 — matter, energy, time: issued once at the beginning, never reissued"
    ],
    closing:"The chain holds. Scarcity was not invented by misers — it was born at 0, and every plan ever made is someone spending the first purse.",
    aadi:"I recited 'limited resources' in an exam two weeks ago. Tonight I BUILT the limit myself, link by link, back to the start of everything. It will not come apart again."},
  1:{ steps:[
      "Dhara's arm, mid-pull on the net",
      "Yesterday's bread, burning inside that arm",
      "A field of wheat, drinking a whole summer of light",
      "The sun, spending its one fire",
      "0 — the single issue of everything, at the beginning"
    ],
    closing:"The chain holds. Work is eaten sunlight, spent through a hand — and a hand that LEARNS wastes less of the loan with every repetition. That is all skill is.",
    aadi:"In the City they made us chant 'labor is a factor of production'. Nobody said it was SUNLIGHT learning to tie knots. I built that sentence myself just now — it's mine."}
};
let chainIdx = 0, chainTries = 0;
function startVision(){
  chainIdx = 0; chainTries = 0;
  $("plan").style.display="none"; $("store").style.display="none"; $("crew").style.display="none";
  const V = VCHAIN[S.era];
  stage.innerHTML = `<svg viewBox="0 0 390 560" ${PAR} xmlns="http://www.w3.org/2000/svg">
    <rect width="390" height="560" fill="#0B1024"/>
    <circle cx="70" cy="90" r="1.3" fill="#EDE6D6" class="tw"/><circle cx="320" cy="120" r="1.3" fill="#EDE6D6" class="tw2"/>
    <circle cx="195" cy="250" r="12" fill="#D4AF37"/>
    <circle cx="195" cy="250" r="44" fill="#D4AF37" opacity="0.3" class="glow"/>
    <circle cx="195" cy="250" r="100" fill="#8E7BC8" opacity="0.15" class="glow"/>
    <text x="195" y="257" text-anchor="middle" font-size="19" font-weight="800" fill="#EDE6D6" font-family="Cinzel,serif">0</text>
    <text x="195" y="30" text-anchor="middle" font-size="11" letter-spacing="3" fill="#8E7BC8" font-family="Cinzel,serif">VISION · BUILD THE CHAIN</text>
  </svg>`;
  say([
    {who:"tali", t:"(The talisman does not show you the answer this time. It hands you the LINKS. Build the chain yourself — from where you stand, back to 0. Tap them in order.)"}
  ], drawChain);
}
function drawChain(){
  const V = VCHAIN[S.era];
  const order = V.steps.map((_,i)=>i);
  /* stable shuffle: rotate by 2 so it is never in given order, deterministic */
  const shown = order.slice(2).concat(order.slice(0,2));
  dlg.innerHTML = `<div class="chainrow fadein">
    <div style="font-size:.8rem; color:var(--dim); font-style:italic; padding:0 2px;">nearest first — furthest last</div>
    ${shown.map(i=>`<button class="chainbtn ${i<chainIdx?'done':''}" id="ch${i}" onclick="chainTap(${i})">${i<chainIdx?'✦ ':''}${V.steps[i]}</button>`).join("")}
    <button class="ghostbtn" onclick="endVision(false)" style="align-self:flex-start;">enough — return ↩</button>
  </div>`;
}
function chainTap(i){
  const V = VCHAIN[S.era];
  if(i===chainIdx){
    chainIdx++;
    S.log.visions = Math.max(S.log.visions, Math.round(3*chainIdx/V.steps.length));
    if(chainIdx>=V.steps.length){
      say([{who:"tali", t:"("+V.closing+")"},{who:"aadi", t:V.aadi}], ()=>endVision(true));
    } else drawChain();
  } else {
    chainTries++; S.log.probeRetries++;
    const b = $("ch"+i); if(b){ b.classList.add("shake"); setTimeout(()=>b.classList.remove("shake"), 400); }
  }
}
function endVision(done){
  if(S.era===0){ stage.innerHTML = valleySVG(); $("store").style.display="block"; drawStore();
    if(S.scene==="plan") showPlan(); else exploreChoices(); }
  else { stage.innerHTML = lakeSVG();
    if(S.scene==="crew") showCrew(); else exploreLake(); }
}

/* ---------------- generic whitestory runner (v9: probes carry cube faces) ---------------- */
let WS=null, wsIdx=0, wsPicks=[], probeIdx=0;
function wsRun(cfg){ WS=cfg; wsIdx=0; wsPicks=[]; probeIdx=0; wsBlankStep(); }
function wsBlankStep(){
  if(wsIdx >= WS.blanks.length){ probeIntro(); return; }
  const b = WS.blanks[wsIdx];
  const built = WS.blanks.map((x,i)=> i<wsIdx ? `${x.label} <span class="blank">${x.opts[wsPicks[i]]}</span>` : (i===wsIdx? `${x.label} <span class="blank">＿＿＿</span>`:"")).join(" ");
  dlg.innerHTML = `<div class="ws fadein"><h3>SAY IT IN YOUR OWN WORDS</h3>
    <div>${built}</div>
    <div class="wchoices">${b.opts.map((o,i)=>`<button class="wchoice" onclick="wsPick(${i})">${o}</button>`).join("")}</div></div>`;
}
function wsPick(i){
  const b = WS.blanks[wsIdx];
  if(i===b.ok){ wsPicks.push(i); wsIdx++; wsBlankStep(); }
  else {
    S.log.probeRetries++;
    say([{who:"world", t:WS.counters[Math.min(wsIdx, WS.counters.length-1)] }], wsBlankStep);
  }
}
function probeIntro(){
  say([
    {who:"narr", t:"The sentence stands. And now — the place itself leans in. Three voices, three tests. This is how the land decides whether understanding is OWNED or borrowed."}
  ], probeStep);
}
function probeStep(){
  if(probeIdx >= WS.probes.length){ WS.onDone(); return; }
  const p = WS.probes[probeIdx];
  say([{who:"world", t:`${p.who}: ${p.q}`}], ()=>{
    choices(p.opts.map((o,i)=>({t:o, fn:()=>{
      if(i===p.ok){ probeIdx++; probeStep(); }
      else {
        S.log.probeRetries++;
        if(p.face) S.log.faceGaps[p.face]++;
        say([{who:"world", t:`${p.who}: "…No. You are reciting again. Stand in what you DID, and answer from there."`}], probeStep);
      }
    }})));
  });
}

          {who:"world", t:`THE LAKE: "Spent well. And look — the card still burns. Knowledge is the only coin that survives its spending."`},
          {who:"shyam", t:`"Did you notice, talisman? The lake asked for the OLD lesson before it would teach the new one. What do you suppose the next place will ask for?"`}
        ], ()=>{ stage.innerHTML = lakeSVG(pageCameo(430)); tellLake(k); });
      }},
      {t:"Whatever a mended net is worth at the festival.", fn:()=>{
        S.log.gateRetries++; S.log.faceGaps.What++;
        say([{who:"world", t:`THE LAKE: "You are pricing the NET. I asked the price of the MENDING — the morning itself. Come again."`}], ()=>lakeGate(k));
      }}
    ]);
  });
}
function tellLake(k){
  S.seen2[k]=true;
  if(k==="hands") S.watched=true;
  say([{who: k==="hands"?"narr":"world", t:TELL2[k].t}], ()=>{ addClue(TELL2[k].clue); exploreLake(); });
}

/* ---------------- crew assignment (v9: prediction before day one) ---------------- */
function startCrew(){
  S.scene="crew";
  stage.innerHTML = lakeSVG();
  if(S.day===1 && S.week===1 && !S.netPrediction){
    say([
      {who:"aadi", t:"Karn's arms are twice mine — nets to Karn, obviously. The rest… wherever. Unless you've been watching something I haven't?"},
      {who:"shyam", t:`"Before a single hand is set — commit, talisman. Whose hand fills baskets fastest AT THE NETS? Name it now, and the dusk will grade you."`}
    ], ()=>{
      choices([
        {t:"Karn — strength pulls the heaviest catch.", fn:()=>setNetPred("karn")},
        {t:"Dhara — a steady pull that never slips beats a strong one that tears.", fn:()=>setNetPred("dhara")},
        {t:"I won't guess what I haven't watched. (Watch the hands first.)", fn:()=>{
          S.netPrediction="watch"; S.log.predictions.push({what:"nets", said:"watch"});
          say([{who:"shyam", t:`"A guess withheld until the eyes have worked — that is not ignorance, talisman. That is method."`}], ()=>{
            if(!S.seen2.hands){ tellLake("hands"); } else showCrew();
          });
        }}
      ]);
    });
  } else showCrew();
}
function setNetPred(p){
  S.netPrediction = p;
  S.log.predictions.push({what:"nets", said:p});
  say([{who:"shyam", t:`"Committed. The dusk keeps the score."`}], showCrew);
}
function showCrew(){
  $("crew").style.display="block";
  $("daytitle").textContent = ["Day One","Day Two — festival eve's eve","Last Day — festival eve"][S.day-1] + (S.week>1? " · week "+S.week:"");
  $("rackline").innerHTML = `racks: <b style="color:var(--gold)">${S.stored}</b> / ${SIM2.TARGET}`;
  $("qline").textContent = `net quality: ${Math.round(S.quality*100)}%`;
  renderCrew();
  dlg.innerHTML="";
}
function renderCrew(){
  $("crewrows").innerHTML = Object.keys(SIM2.WORKERS).map(w=>{
    const wk = SIM2.WORKERS[w];
    const gift = S.watched ? wk.gift : "…watch the hands at work to learn this hand";
    const t = S.assign[w];
    const streak = S.streaks[w]||0;
    return `<div class="site">
      <div class="site-name"><span class="nm">${wk.name}${streak>0? ` <span style="color:var(--teal); font-size:.75rem;">practiced ×${streak}</span>`:""}</span><span class="yl">${gift}</span></div>
      <button class="taskbtn" onclick="cycleTask('${w}')">${t? SIM2.TASKNAMES[t] : "— pick task —"}</button>
    </div>`;
  }).join("");
  $("daybtn").disabled = !Object.keys(SIM2.WORKERS).every(w=>S.assign[w]);
}
function cycleTask(w){
  if(S.rotatedDay===S.day && S.week===S.rotatedWeek){ return; }
  const cur = S.assign[w];
  const i = cur? SIM2.TASKS.indexOf(cur) : -1;
  S.assign[w] = SIM2.TASKS[(i+1)%SIM2.TASKS.length];
  renderCrew();
}
function runDay(){
  for(const w in SIM2.WORKERS){
    S.streaks[w] = (S.prevAssign[w]===S.assign[w]) ? (S.streaks[w]||0)+1 : 0;
  }
  const res = computeDay(S.assign, S.streaks, S.quality);
  S.log.days.push({week:S.week, day:S.day, assign:{...S.assign}, stored:res.stored, wasted:res.wasted});
  S.log.wastedTotal += res.wasted;
  S.stored += res.stored;
  S.quality = res.nextQ;
  S.prevAssign = {...S.assign};
  $("crew").style.display="none";
  const practiced = Object.keys(SIM2.WORKERS).filter(w=>S.streaks[w]>0 && S.assign[w]);
  const beats = [
    {who:"narr", t:`The day: ${res.netted} fish netted${res.netted>0?` (the spotters' calls ${res.pts.spot>2?"doubled the casts":"helped"})`:""}. The racks drank ${res.stored}${res.wasted?` — and ${res.wasted} lay silver on the shore till noon, then the smell began. The racks could not hold them`:""}.`}
  ];
  /* v9: the dusk grades the prediction, once */
  if(S.day===1 && S.week===1 && S.netPrediction && S.netPrediction!=="graded"){
    if(S.netPrediction==="karn" && S.assign.karn==="net")
      beats.push({who:"world", t:`THE NETS, at dusk: "You named the arms. Count Karn's basket — and count my torn knots behind him. Strength is real, boy. It is just not what THIS craft is made of."`});
    else if(S.netPrediction==="dhara")
      beats.push({who:"world", t:`THE NETS, at dusk: "You named the steady pull, against the obvious arms. What told you, before the count did? Keep whatever that was — it is worth more than the fish."`});
    else if(S.netPrediction==="karn")
      beats.push({who:"world", t:`THE NETS, at dusk: "You named the arms — yet never sent them to me. Some part of you already doubted the guess. Listen to that part sooner."`});
    S.netPrediction="graded";
  }
  if(practiced.length) beats.push({who:"narr", t:practiced.map(w=>`${SIM2.WORKERS[w].name}'s hands are surer at ${SIM2.TASKNAMES[S.assign[w]]} than yesterday`).join("; ")+"."});
  beats.push({who:"narr", t:`(Net quality stands at ${Math.round(S.quality*100)}% for tomorrow.)`});
  say(beats, ()=>{ S.rung=0; afterDay(res); });
}
function afterDay(res){
  const pace = SIM2.TARGET * S.day/SIM2.DAYS;
  const onPace = S.stored >= pace;
  if(onPace) raiseHI(46 + S.day*4);
  const lines = [];
  if(!onPace){
    lines.push({who:"narr", t:`(At this pace the racks reach ${Math.round(S.stored*SIM2.DAYS/S.day)} by the festival — short of ${SIM2.TARGET}.)`});
    lines.push(shyamAfterDay(res));
  } else {
    lines.push({who:"aadi", t: S.day<3? "Look at the tally. In the valley we moved hands between PLACES. Here the number moved when we let a hand STAY. Something is growing that I can't see…" : "The racks are heavy. Tomorrow the lamps are lit — and the tally speaks for us."});
  }
  say(lines, ()=>{
    if(S.day < SIM2.DAYS){
      S.day++;
      if(S.day===2 && S.week===1){ fairnessEvent(); } else showCrew();
    }
    else festival();
  });
}
function shyamAfterDay(res){
  const bad = worstFit();
  if(res.wasted > 40) return {who:"shyam", t:`"The lake paid ${res.netted} and the racks drank ${res.stored}. Where is the rest now? Who was standing at the smoke while the shore turned silver?"`};
  if(bad && bad.apt<=1.0 && S.assign.karn==="net") return {who:"shyam", t:`"You gave Karn the nets for his arms. What did the fish care about arms?"`};
  const rotated = Object.keys(SIM2.WORKERS).every(w=>!S.streaks[w]);
  if(rotated && S.log.days.length>1) return {who:"shyam", t:`"Every hand somewhere new today. Yesterday's learning — where did it go? Can a hand master four crafts in three days?"`};
  if(S.quality<0.7) return {who:"shyam", t:`"The nets gape wider every dawn. Who is listening to them?"`};
  return {who:"shyam", t:`"Which hand surprised you today? And why were you surprised — what had you assumed about it?"`};
}
function fairnessEvent(){
  say([
    {who:"world", t:`ELDER NILA, at dawn, with half the village behind her: "The families murmur, travelers. Meen's daughter wants a day at the nets. Karn's pride is hurt at the racks. ROTATE the tasks — it is only fair."`},
    {who:"aadi", t:"Fair… every hand gets every task. It sounds right. It sounded right in the City too — everyone the same lessons, everyone the same answers. …Talisman, what do we tell her?"}
  ], ()=>{
    choices([
      {t:"Rotate every hand today — fairness first.", fn:()=>{
        S.log.rotations++;
        for(const w in S.assign){ const i=SIM2.TASKS.indexOf(S.assign[w]); S.assign[w]=SIM2.TASKS[(i+1)%4]; }
        S.rotatedDay = S.day; S.rotatedWeek = S.week;
        say([
          {who:"narr", t:"The village nods, satisfied. Every hand walks to a stranger's post. The morning is full of patient teaching and slow, wrong movements."},
          {who:"shyam", t:`"Fair to the families, yes. Was it fair to the FISH the racks needed? We shall count at dusk, shall we?"`}
        ], showCrew);
      }},
      {t:"Keep hands where they learn — and have Aadi explain why to Nila.", fn:()=>{
        say([
          {who:"aadi", t:"Nila — watch Dhara's pull today, then remember it from two days ago. Something is GROWING in that hand. Move her now and it dies at half-height. After the festival, I'll teach anyone anything. Let the baskets argue for me till then."},
          {who:"world", t:`ELDER NILA, after a long silence: "…The baskets, then. They have until the lamps."`}
        ], showCrew);
      }}
    ]);
  });
}
function festival(){
  S.scene="festival";
  const pass = S.stored >= SIM2.TARGET;
  stage.innerHTML = `
  <svg viewBox="0 0 390 560" ${PAR} xmlns="http://www.w3.org/2000/svg">
    <rect width="390" height="560" fill="#0d1433"/>
    <path d="M0,300 Q195,270 390,296 L390,560 L0,560 Z" fill="#16405c"/>
    ${Array.from({length:7},(_,i)=>`<g><circle cx="${60+i*45}" cy="${340+(i%2)*30}" r="4" fill="#D4AF37" class="glow"/><circle cx="${60+i*45}" cy="${340+(i%2)*30}" r="9" fill="#D4AF37" opacity=".2" class="glow"/></g>`).join("")}
    <g stroke="#5a4a30" stroke-width="2.5" fill="none">
      <path d="M280,220 L280,266 M310,220 L310,266 M340,220 L340,266 M276,232 L344,232 M276,248 L344,248"/>
    </g>
    ${pass? Array.from({length:12},(_,i)=>`<rect x="${278+(i%6)*11}" y="${226+Math.floor(i/6)*16}" width="7" height="4" rx="2" fill="#C2A44A"/>`).join(""):""}
    <text x="195" y="30" text-anchor="middle" font-size="11" letter-spacing="3" fill="#8A90B0" font-family="Cinzel,serif">THE FESTIVAL OF LAMPS · THE DOOR IS THE TEST</text>
  </svg>`;
  if(pass){
    say([
      {who:"narr", t:`The lamps go out on the water one by one, each on its little raft. The racks stand FULL: ${S.stored} against the ${SIM2.TARGET} needed. No one will owe the far villages their spring.`},
      {who:"world", t:`ELDER NILA, holding up her palms, cracked with sixty winters of mending: "Same hands as last year, travelers. Same lake. Same days. What did you change?"`},
      {who:"aadi", t:"Nothing — and everything. We stopped asking hands to be EQUAL and started asking them to be THEMSELVES. Then we let them repeat until the work moved in. Nila — the hours were never the work. The hours were just… the jar."}
    ], ()=>{ raiseHI(80); sceneWhiteStory1(); });
  } else {
    const rotated = S.log.rotations>0;
    say([
      {who:"narr", t:`The lamps are lit over thin racks: ${S.stored} of ${SIM2.TARGET}. The far villages send fish — and take the promise of spring nets in return. No one starves. Everyone remembers.`},
      /* v9: the world tells, plainly, tied to the attempt */
      rotated? {who:"world", t:`THE RACKS: "Count the rotation day against the days around it: every hand at a stranger's post, every craft starting from nothing again. Hear the law you bought with this thin winter: LABOR IS NOT TIME. It is time FILLED — with fit, and with practice. Fairness of hands is not fullness of racks."`}
             : {who:"world", t:`THE RACKS: "Look at the three days together, boy. The hands that stayed grew; the hands that fit their craft grew fastest. Hear the law you bought with this thin winter: LABOR IS NOT TIME. It is time FILLED — with fit, and with practice."`},
      rotated? {who:"shyam", t:`"The rotation day — you heard the racks name its price. Who ended up paying it: the families whose pride was spared, or the children whose fish went east?"`}
             : {who:"shyam", t:`"Three days, five hands. Which hand never found its craft? And who chose where it stood?"`},
      {who:"world", t:`ELDER NILA: "The lake forgives. The week returns. Set the hands again, travelers — and this time set them like you have WATCHED them."`}
    ], ()=>{
      S.week++; S.log.weeks=S.week; S.day=1; S.stored=0; S.quality=SIM2.QSTART;
      S.assign={}; S.prevAssign={}; S.streaks={}; S.rotatedDay=0;
      stage.innerHTML = lakeSVG(); showCrew();
    });
  }
}

/* ---------------- era 1 whitestory ---------------- */
function sceneWhiteStory1(){
  S.scene="whitestory";
  stage.innerHTML = lakeSVG(`<circle cx="195" cy="200" r="60" fill="#EDE6D6" opacity="0.06" class="glow"/>`);
  say([
    {who:"narr", t:"After the lamps, the village gathers at the shore. The custom here is the same as everywhere the talisman goes: whoever changes a season must SAY what they understood, where the water can test it."},
    {who:"shyam", t:`"Same rule as the valley, talisman. Out of what you DID — can you build it?"`}
  ], ()=> wsRun({
    blanks:[
      {label:"I want to", opts:["make every hand equally busy","fill the festival racks","catch every fish in the lake"], ok:1},

      {label:"so that", opts:["the village eats through the lean days","no family envies another","the lake learns respect"], ok:0},
      {label:"creating value through", opts:["strong arms","work fitted to the worker, sharpened by repetition","longer days"], ok:1}
    ],

      `THE RACKS: "Look at the tally, not at the words. What actually filled us?"`
    ],

      {who:"THE NETS", face:"How", q:"\"How do you know practice grows the catch?\"",

      {who:"THE LAKE", face:"Why", q:"\"Why do equal hours fill unequal baskets?\"",

function wsDone1(){
  S.cards.push({
    name:"Labor — the Hand that Learns",
    C:"Eight hours are equal for everyone; baskets are not. A village worked dawn to dusk and stayed thin — effort without fit and practice leaks.",
    I:"Five hands, four crafts, three days — each hand carrying a different gift: eyes, back, steadiness, fingers, sixty years of water.",
    P:"Fitting work to the worker, then letting repetition compound — the same hand at the same craft, a steeper catch each day. Refusing the rotation that resets the climb.",
    M:"Racks full past the festival — and the law under it: labor is not time. It is time FILLED — with fit, and with practice. And now there is more than mouths…"

  raiseHI(92); hud(true);

    {who:"narr", t:"The talisman flares again — brighter than at the valley. A second card writes itself beside the first. (Codex: 'Labor — the Hand that Learns' lights.)"},

}
function sceneThreshold1(){
  S.scene="threshold";
  stage.innerHTML = mapSVG(1, 2);
  say([
    {who:"tali", t:"(The map stirs again. Two nodes burn gold now. The road ahead — surplus, property, exchange — sits in their light differently than it did. You can feel the next question before anyone asks it.)"},
    {who:"narr", t:"Because here is what full racks do that thin racks never did: three days after the festival, the racks are STILL full. The village eats, and eats, and the pile does not end. On the fourth day, flies find the northern rack. Old Puna stands before it, saying nothing."},
    {who:"world", t:`OLD PUNA, finally: "Sixty years. I have never once seen a pile outlive its week. What does a village DO with more-than-enough?"`},
    {who:"aadi", t:"More than enough… The valley taught us to fill the store. The lake taught us HOW hands fill it faster than hours should allow. Nobody ever taught anyone what happens AFTER the store is full. Shyam? …of course. Gone ahead again."},
    {who:"shyam", t:`"*faint, from the northern road* The pile is asking you a question, boy. Are you coming, or will you let the flies answer it?"`}
  ], ()=>sceneLog(1));

/* ==========================================================================
   JOURNEY LOG — era-aware (v9: inventions, predictions, cube faces)
   ========================================================================== */
function sceneLog(era){
  const chips = era===0
    ? S.log.plans.map(p=>{
        const parts = Object.keys(p.alloc).filter(k=>p.alloc[k]>0).map(k=>`${k}:${p.alloc[k]}`).join(" ");
        return `<span class="clue" style="border-color:var(--line); color:var(--stone);">s${p.season}·m${p.moon} — ${parts}${p.push?" ·pushed":""}</span>`;
      }).join(" ")
    : S.log.days.map(d=>{
        const parts = Object.keys(d.assign).map(w=>`${w.slice(0,4)}→${d.assign[w]}`).join(" ");
        return `<span class="clue" style="border-color:var(--line); color:var(--stone);">w${d.week}·d${d.day} — ${parts} (+${d.stored}${d.wasted?`, waste ${d.wasted}`:""})</span>`;
      }).join(" ");
  const invChips = S.log.inventions.map(x=>
    `<span class="clue" style="border-color:${x.worked?'var(--teal)':'var(--sienna)'}; color:${x.worked?'var(--teal)':'var(--sienna)'};">⚒ ${x.problem}·${x.method} — ${x.worked?"worked":"failed, taught"}</span>`).join(" ");
  const stats = era===0
    ? `seasons: <b style="color:var(--text)">${S.log.seasons}</b> · fruit rotted: <b style="color:var(--text)">${S.log.fruitRotTotal}</b> · fish lost: <b style="color:var(--text)">${S.log.fishRotTotal}</b> · pushes: <b style="color:var(--text)">${S.log.pushes}</b>`
    : `weeks: <b style="color:var(--text)">${S.log.weeks}</b> · fish wasted on shore: <b style="color:var(--text)">${S.log.wastedTotal}</b> · rotations chosen: <b style="color:var(--text)">${S.log.rotations}</b> · gate retries: <b style="color:var(--text)">${S.log.gateRetries}</b>`;
  const fg = S.log.faceGaps;
  const faces = (fg.What+fg.How+fg.Why)>0
    ? `faces still soft — What: <b style="color:var(--text)">${fg.What}</b> · How: <b style="color:var(--text)">${fg.How}</b> · Why: <b style="color:var(--text)">${fg.Why}</b>`
    : `every face held — What, How and Why all answered from lived ground`;
  dlg.innerHTML = `
  <div class="dline" style="cursor:default;">
    <div style="font-size:.64rem; letter-spacing:1.5px; color:var(--dim); text-transform:uppercase; margin-bottom:8px; font-family:'Cinzel',serif;">Journey log · episode ${era} — what the game learned about the learner</div>
    <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:9px;">${chips}</div>
    ${invChips? `<div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:9px;">${invChips}</div>`:""}
    <div style="font-size:.9rem; color:var(--stone);">${stats} · Shyam asked: <b style="color:var(--text)">${S.log.asks}×</b> (deepest rung ${S.log.deepestRung}/4) · chain built: <b style="color:var(--text)">${S.log.visions}/3</b> · probes retried: <b style="color:var(--text)">${S.log.probeRetries}</b></div>
    <div style="font-size:.85rem; color:var(--stone); margin-top:6px;">${faces}</div>
    <div style="font-size:.82rem; color:var(--dim); margin-top:9px;">${era===0
      ? "Every rotted basket is a diagnosed misconception; every failed experiment, a hunch corrected; every extra season, productive failure at work."
      : "The rotation tally, the shore waste, the caught flaws in Aadi's retellings — each names the exact idea that still wobbles. At the Gate, one day, Aadi answers with all of it."}</div>
    <div class="btnrow" style="margin-top:10px;">
      ${era===0? `<button class="gobtn" style="margin-left:0;" onclick="goEast()">Walk east — toward the question ▸</button>`:""}
      <button class="ghostbtn" onclick="openCodex()">Open the Codex ✦</button>
      <button class="ghostbtn" onclick="location.reload()">Play again</button>
    </div>
    <div style="font-size:.8rem; color:var(--dim); margin-top:12px; text-align:center; font-style:italic;">${era===0? "…the road continues…" : "…and, for the time being, that's all folks…"}</div>
  </div>`;
  $("clues").classList.remove("on");
  if(era===1){ $("shyambtn").style.display="none"; $("visionbtn").style.display="none"; }
}

/* ---------------- codex ---------------- */

    <div style="border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px;">

      <div class="cipm-row"><span class="k">C</span><span class="v">${c.C}</span></div>
      <div class="cipm-row"><span class="k">I</span><span class="v">${c.I}</span></div>
      <div class="cipm-row"><span class="k">P</span><span class="v">${c.P}</span></div>
      <div class="cipm-row"><span class="k">M</span><span class="v">${c.M}</span></div>

  <div class="lockedcard">${locked}</div>`;
  $("modal").classList.add("on");
}
